            the age requirement.
          nullable: true
        transaction:
          description: "The verification session's transaction number.\n         \
            \   \nThis is a unique identifier assigned to a single ConnectID transaction\
            \ flow. It can be used for audit purposes or to flag fraudulent activity."
          example: qaTTTTuhVnTck8zQlba4pFW2jo55555UfIoOEYv8sJq
          nullable: true
          type: string
        address:
          allOf:
          - $ref: "#/components/schemas/ConnectIdAddress"
          description: The address.
          nullable: true
      type: object
    ContractAttachment:
      description: Information about an attachment that a Provider may return in verification
        results.
      example:
        type: document_portrait
        outputted: Always
      properties:
        type:
          description: "The type of the attachment as it appears in verification results.\n\
            \            \nPossible values:\n- \"selfie\"\n- \"document_front\"\n\
            - \"document_back\"\n- \"document_portrait\"\n- \"document_signature\"\
            \n- \"document_scan_report\"\n            \nAdditional attachment types\
            \ may be defined for specific Providers."
          example: document_portrait
          type: string
        outputted:
          allOf:
          - $ref: "#/components/schemas/AttributeAvailability"
          description: Indicates when this attachment will be present in verification
            results.
          example: Always
          x-enumDescriptions:
            Never: This attribute will never be present in verification results.
            Sometimes: This attribute may or may not be present depending on the verification
              context.
            Always: This attribute will always be present in verification results.
      required:
      - outputted
      - type
      type: object
    ContractAttribute:
      description: Information about an attribute that a Provider may return in verification
        results.
      example:
        scope: person.givenName
        outputted: Always
      properties:
        scope:
          description: The scope of the attribute as it appears in verification results.
          example: person.givenName
          type: string
        outputted:
          allOf:
          - $ref: "#/components/schemas/AttributeAvailability"
          description: Indicates when this attribute will be present in verification
            results.
          example: Always
          x-enumDescriptions:
            Never: This attribute will never be present in verification results.
            Sometimes: This attribute may or may not be present depending on the verification
              context.
            Always: This attribute will always be present in verification results.
      required:
      - outputted
      - scope
      type: object
    CoteDIvoireNidLookup2Input:
      properties:
        idNumber:
          description: The user's National ID number (NNI) or document number
          nullable: true
          type: string
      type: object
    CoteDIvoireNidLookup2ProviderOutput:
      description: Exposed properties for the `cote-divoire-nid-lookup-2` Provider
        which do not directly map to the normalized IdentityData model.
      properties:
        fullName:
          description: Full name as returned by ONECI (National Civil Registry and
            Identification Office).
          example: Jean Dupont
          type: string
        givenName:
          description: Given name of the ID holder as returned by ONECI (National
            Civil Registry and Identification Office).
          example: Jean
          type: string
        familyName:
          description: Family name of the ID holder as returned by ONECI (National
            Civil Registry and Identification Office).
          example: Dupont
          type: string
        dateOfBirth:
          description: Date of birth as returned by ONECI (National Civil Registry
            and Identification Office).
          example: 2000-01-01
          format: date
          type: string
        sex:
          description: |-
            Sex of the ID holder as returned by ONECI (National Civil Registry and Identification Office).
            Possible values:
            - Male
            - Female
          example: Male
          type: string
        nationality:
          description: Nationality as ISO 3166-1 alpha-2 country code (e.g. "CI" for
            Côte d'Ivoire).
          example: CI
          type: string
        address:
          description: |-
            Address as returned from ONECI (National Civil Registry and Identification Office).
            Format is LOCALITY,COMMUNE: the locality (village, neighborhood, or sous-quartier)
            followed by the commune. Not a full street address.
          example: "PLATEAU,ABIDJAN"
          nullable: true
          type: string
        documentNumber:
          description: |-
            The document's own identifier (printed on the card; often labeled "Immatriculation" on older cards or "Numéro CNI" in
            post-2020 cards). On older cards this is usually one letter followed by 10 digits. On new cards it appears as 1 or 2
            leading letters plus 9 digits.
          example: I001111111
          nullable: true
          type: string
        nationalIdNumber:
          description: |-
            The NNI (Numéro National d'Identification): the person's 11-digit national ID, printed on the back of the new
            national id card and assigned by ONECI. It is always exactly 11 digits with no letters, and is semi-random,
            non-repetitive, and does not encode any extra data, such as date of birth, gender, or other readable attributes.
          example: "12345678901"
          nullable: true
          type: string
      required:
      - dateOfBirth
      - familyName
      - fullName
      - givenName
      - nationality
      - sex
      type: object
    CreateDirectProviderSessionRequest:
      example:
        fallbackToHostedUI: true
        redirectUrl: redirectUrl
        capabilities:
        - LaunchBrowser
        - LaunchBrowser
        provider: provider
        providerInput: ""
        verificationProfileId: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        browserLanguages:
        - browserLanguages
        - browserLanguages
      properties:
        provider:
          description: The ID of the provider to launch
          minLength: 1
          type: string
        verificationProfileId:
          description: The ID of the Verification Profile to use for this session.
          format: uuid
          type: string
        redirectUrl:
          description: "The Redirect URL to which the user should be sent after the\
            \ session is complete.\n            \nThis field is required for providers\
            \ which employ a redirect-based flow."
          nullable: true
          type: string
        capabilities:
          description: "The list of capabilities your integration supports. Capabilities\
            \ are the core of Trinsic's whitelabel-with-optional-fallback offering.\n\
            \            \nMost capabilities align with either an `IntegrationLaunchMethod`\
            \ or an `IntegrationCollectionMethod`.\nThe exception being refresh content\
            \ to support updating the content of the launch method.\n            \n\
            For example, to support a basic redirect-based flow, you must include\
            \ the `LaunchRedirect` and `CaptureRedirect` capabilities.\nTo support\
            \ a mobile deeplink / polling flow, you must include the `DeeplinkToMobile`\
            \ and `PollForResults` capabilities.\n            \nIf `FallbackToHostedUi`\
            \ is `true`, Trinsic will automatically fall back to a Trinsic-hosted\
            \ UI to cover any gaps in your integration's capabilities.\nIf `FallbackToHostedUi`\
            \ is `false`, gaps in your integration's capabilities will result in an\
            \ error during Session creation.\n            \nRead more on how to integrate\
            \ at <a href=\"https://docs.trinsic.id/docs/direct-provider-sessions\"\
            >the guide on Direct Provider Sessions</a>"
          items:
            $ref: "#/components/schemas/IntegrationCapability"
          minItems: 1
          type: array
        fallbackToHostedUI:
          description: "Whether the session should fall back to a Trinsic-hosted UI\
            \ in certain instances.\n            \nSpecifically, fallback will occur\
            \ if any of the following are true:\n- You attempted to launch a provider\
            \ which requires a capability you did not express support for\n    - In\
            \ this case, Trinsic's hosted UI will perform the necessary capability\n\
            - You attempted to launch a provider which requires input, and the input\
            \ was either not provided or incomplete\n    - In this case, Trinsic's\
            \ hosted UI will collect the necessary input from the user\n         \
            \   \nIf fallback occurs, the session's NextStep will always be LaunchBrowser,\n\
            and the CollectionMethod will always be CaptureRedirect.\n           \
            \ \nIf this field is set to `true`, you must also:\n1. Set the `RedirectUrl`\
            \ field to a non-empty value\n2. Include the `LaunchBrowser` and `CaptureRedirect`\
            \ capabilities in the `Capabilities` field"
          nullable: true
          type: boolean
        browserLanguages:
          description: |-
            Preferences for languages to show first if the session falls back to the Trinsic-hosted UI.
            If left empty, the Hosted UI defaults to the user's navigator languages. If no preferred
            language is available, the Hosted UI falls back to English.
            This only will be used if the session falls back to the Trinsic-hosted UI.
          items:
            type: string
          nullable: true
          type: array
        providerInput:
          allOf:
          - $ref: "#/components/schemas/ProviderInput"
          description: Provider-specific input for those providers which require it.
          nullable: true
      required:
      - capabilities
      - provider
      - verificationProfileId
      type: object
    CreateDirectProviderSessionResponse:
      example:
        resultCollection: ""
        nextStep: ""
        sessionId: 00000000-0000-0000-0000-000000000000
      properties:
        sessionId:
          description: The ID of the newly-created Acceptance Session
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        resultCollection:
          allOf:
          - $ref: "#/components/schemas/ResultCollection"
          description: The method by which you must collect the results of the Acceptance
            Session.
        nextStep:
          allOf:
          - $ref: "#/components/schemas/IntegrationStep"
          description: The next step you must take to launch the user into the integration
      required:
      - nextStep
      - resultCollection
      - sessionId
      type: object
    CreateHostedProviderSessionRequest:
      example:
        redirectUrl: redirectUrl
        provider: provider
        providerInput: ""
        verificationProfileId: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        browserLanguages:
        - browserLanguages
        - browserLanguages
      properties:
        provider:
          description: The ID of the provider to launch
          minLength: 1
          type: string
        verificationProfileId:
          description: The ID of the Verification Profile to use for this session.
          format: uuid
          type: string
        redirectUrl:
          description: The Redirect URL to which the user should be sent after the
            session is complete.
          minLength: 1
          type: string
        browserLanguages:
          description: |-
            Preferences for languages to show first in the Hosted UI. If left empty, the Hosted UI
            defaults to the user's navigator languages. If no preferred language is available,
            the Hosted UI falls back to English.
          items:
            type: string
          nullable: true
          type: array
        providerInput:
          allOf:
          - $ref: "#/components/schemas/ProviderInput"
          deprecated: true
          description: |-
            Provider-specific input for those providers which require it.


            <b>Deprecated:</b> In the future, Hosted Provider Sessions will not accept input on creation,
            and will instead always redirect the user to a hosted interface to collect input. If you need
            to collect input from the user yourself, please use the Create Direct Session endpoint instead.
          nullable: true
      required:
      - provider
      - redirectUrl
      - verificationProfileId
      type: object
    CreateHostedProviderSessionResponse:
      example:
        sessionId: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        launchUrl: https://verify.trinsic.id/api/session/launch?clientToken=...
        resultsAccessKey: 417zNGHMJp6Ht2jCoktTLNGDRZEt4BqTwwQ8Q9ZaQz8aS4Jd7nD1xff2WLhPS69j5q9QT4gvgV79Gv7QtaXwu5YC9Utr35...
      properties:
        sessionId:
          description: The ID of the newly-created Acceptance Session
          format: uuid
          type: string
        launchUrl:
          description: "The URL that should be used to launch the Hosted Provider\
            \ Session on your user's device.\n            \nThere are two recommended\
            \ ways to do so:\n- Redirect their browser to the `LaunchUrl` as a top-level\
            \ navigation\n- Open a popup window and navigate it to the `LaunchUrl`\n\
            \            \nThis URL is sensitive and as such can only be obtained\
            \ once. If you need to obtain it again, you will need to create a new\
            \ Acceptance Session."
          example: https://verify.trinsic.id/api/session/launch?clientToken=...
          type: string
        resultsAccessKey:
          description: "The `resultsAccessKey` for the Acceptance Session.\n     \
            \       \nThis is an encrypted payload which contains the decryption key\
            \ necessary to access the Session's Data Vault.\n            \nSave this\
            \ securely in your systems; it must be passed back with any API call which\
            \ requires access to the Session's Data Vault.\n            \nTrinsic\
            \ cannot access a Session's Data Vault without this key."
          example: 417zNGHMJp6Ht2jCoktTLNGDRZEt4BqTwwQ8Q9ZaQz8aS4Jd7nD1xff2WLhPS69j5q9QT4gvgV79Gv7QtaXwu5YC9Utr35...
          type: string
      required:
      - launchUrl
      - resultsAccessKey
      - sessionId
      type: object
    CreateVerificationProfileResponse:
      example:
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
      properties:
        id:
          description: The ID of the verification profile
          format: uuid
          type: string
      required:
      - id
      type: object
