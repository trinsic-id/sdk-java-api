          example: 2025-06-01T20:43:54.472+05:30
          format: date-time
          nullable: true
          type: string
        timeToLive:
          description: The validity expiration timestamp for the verification document.
          format: date-time
          nullable: true
          type: string
        aadhaarNumberLastFour:
          description: "The Aadhaar number (UID) value for the individual.\n     \
            \       \nThis is only the last four digits of the Aadhaar number."
          example: "1234"
          nullable: true
          type: string
        claims:
          allOf:
          - $ref: "#/components/schemas/AadhaarClaims"
          description: The claims extracted from the Aadhaar document.
          nullable: true
        localizedClaims:
          allOf:
          - $ref: "#/components/schemas/AadhaarLocalizedClaims"
          description: The localized claims extracted from the Aadhaar document.
          nullable: true
        documentSignatureValidated:
          description: "Whether our own validation of the Aadhaar document signature\
            \ and certificate chain succeeded.\n            \nWhen the signed document\
            \ (e.g. Digilocker XML) is available, we validate it using the standard\
            \ CCA/SafeScrypt chain.\nWhen the document is not returned, the signature\
            \ cannot be validated and this is false. Some providers (e.g. Signzy)\
            \ also\nsupply a separate DSC validation indicator in the webhook payload;\
            \ that is independent of this flag, which reflects only our validation."
          example: true
          type: boolean
        digilockerId:
          description: "DigiLocker's 36-character stable account identifier.\n   \
            \         \nThis identifier is deemed safe to use to reference the individual.\n\
            *Note, the format is not guaranteed to be a UUID."
          example: 9b2d5f6e-3c4a-4d7f-a1e2-8f6b9c0d1a2e
          nullable: true
          type: string
        issuerId:
          description: The identifier for the issuer of the DigiLocker document.
          example: in.gov.uidai
          nullable: true
          type: string
        issuer:
          description: Issuer name for the DigiLocker document.
          example: Unique Identification Authority of India (UIDAI)
          nullable: true
          type: string
        mobilePhone:
          description: The individual's mobile phone number from DigiLocker's account
            details.
          example: "7981112222"
          nullable: true
          type: string
        scope:
          description: |-
            DigiLocker consent scopes that the individual actually consented to for this session.
            Included in provider output so customers can verify what was granted: the customer does not control
            these—the individual chooses scopes in the DigiLocker consent UI, and there is no way to pre-select
            or enforce them. This is a common source of error (e.g. the individual skips a scope), so surfacing the
            granted scopes lets customers confirm the session had the expected consent.
          example:
          - file.partners/PANCR
          - userdetails
          - email
          - files.issueddocs
          - picture
          items:
            type: string
          type: array
      required:
      - documentSignatureValidated
      - scope
      type: object
    SingpassLoginProviderOutput:
      description: Exposed properties for the `singpass-login` Provider which do not
        directly map to the normalized IdentityData model.
      properties:
        sub:
          description: "The Singpass subject identifier.\n            \nThis is a\
            \ public identifier which is globally unique across the Singpass system."
          example: e3f1c2d4-8a9b-4c2d-b3f1-9a8b7c6d5e4f
          nullable: true
          type: string
        accountType:
          description: "The Singpass account type for this user.\n            \nPossible\
            \ values:\n- foreign (Singpass Foreign Account (SFA) holders)\n- standard\
            \ (Singapore Citizens, Permanent Residents, or FIN holders)"
          example: standard
          nullable: true
          type: string
        identityNumber:
          description: "The Unique Identifier Number (UINFIN) for the user.\n    \
            \        \nThe number can be either the National Registration Identity\
            \ Card or Foreign Identification Number (NRIC/FIN).\nFollows the format\
            \ @xxxxxxx#:\n- @ is the status of the holder.\n    - Singapore citizens\
            \ and permanent residents born before 1 January 2000 are assigned the\
            \ letter \"S\".\n    - Singapore citizens and permanent residents born\
            \ on or after 1 January 2000 are assigned the letter \"T\".\n    - Foreigners\
            \ issued with long-term passes before 1 January 2000 are assigned the\
            \ letter \"F\".\n    - Foreigners issued with long-term passes from 1\
            \ January 2000 to 31 December 2021 are assigned the letter \"G\".\n  \
            \  - Foreigners issued with long-term passes on or after 1 January 2022\
            \ are assigned the letter \"M\".\n- xxxxxxx is seven digit serial number.\n\
            - # is the checksum letter."
          example: S1234567A
          nullable: true
          type: string
        countryOfIssuance:
          description: The individual's identity country of issuance.
          example: SG
          nullable: true
          type: string
        name:
          description: The individual's principal name.
          example: Lim Wei Ming
          nullable: true
          type: string
        email:
          description: The individual's email address.
          example: wei.ming.lim@example.sg
          nullable: true
          type: string
        mobileNumber:
          description: "The individual's mobile number.\n            \nFor Singpass\
            \ Foreign Account (SFA) users, this will always be null."
          example: "+6591234567"
          nullable: true
          type: string
      type: object
    SingpassMyInfoDescription:
      properties:
        code:
          description: The code for the following description.
          example: P1Pass
          nullable: true
          type: string
        description:
          description: The full description of the field.
          example: Employment Pass
          nullable: true
          type: string
      type: object
    SingpassMyInfoProviderOutput:
      description: Exposed properties for the `singpass-myinfo` Provider which do
        not directly map to the normalized IdentityData model.
      properties:
        sub:
          description: The Singpass subject identifier.
