    PolandEdoAppProviderOutput:
      description: Exposed properties for the `a-edoapp-eid-login` Provider which
        do not directly map to the normalized IdentityData model.
      properties:
        firstName:
          description: The first name of the verified individual
          example: John
          type: string
        lastName:
          description: The last name of the verified individual
          example: Doe
          type: string
        dateOfBirth:
          description: The date of birth of the verified individual
          example: 1985-12-10
          format: date
          type: string
        nationalIdentificationNumber:
          description: "The 11-digit Polish national identification number (PESEL)\
            \ of the verified individual.\n            \nThis is in the format YYMMDDZZZGQ,\
            \ where:\n- YYMMDD is the date of birth\n- ZZZ is a unique identifier\n\
            - G is sex (even for females, odd for males)\n- Q is a checksum digit\n\
            \            \nThe year of birth encoded in this identifier assumes a\
            \ default year of birth in the 20th century.\nIf the year of birth is\
            \ in the range [1800, 1899], the month portion is incremented by 80.\n\
            If the year of birth is in the range [2000, 2099] the month portion is\
            \ incremented by 20.\nIf the year of birth is in the range [2100, 2199],\
            \ the month portion is incremented by 40.\nIf the year of birth is in\
            \ the range [2200, 2299], the month portion is incremented by 60."
          example: "90063014513"
          type: string
      required:
      - dateOfBirth
      - firstName
      - lastName
      - nationalIdentificationNumber
      type: object
