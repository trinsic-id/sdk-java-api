            \ CCA/SafeScrypt chain.\nWhen the document is not returned, the signature\
            \ cannot be validated and this is false. Some providers (e.g. Signzy)\
            \ also\nsupply a separate DSC validation indicator in the webhook payload;\
            \ that is independent of this flag, which reflects only our validation."
