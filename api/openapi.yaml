        do not directly map to the normalized IdentityData model.
      properties:
        curpStatus:
          description: "Curp status for the subject.\n            \nPossible values:\n\
            - AN: Alta Normal (Normal registration) - Active\n- AH: Alta con Homonimia\
            \ (Registration with homonymy) - Active\n- RCC: Registro de cambio afectando\
            \ a CURP (Change affecting CURP) - Active\n- RCN: Registro de cambio no\
            \ afectando a CURP (Change not affecting CURP) - Active\n- BAP: Baja por\
            \ documento apócrifo (Low due to apocryphal document) - Inactive\n- BSU:\
            \ Baja sin uso (Low curp without use) - Inactive\n- BD: Baja por defunció\
            n (Low curp due to death) - Inactive\n- BDM: Baja administrativa (Low,\
            \ due to administrative process) - Inactive\n- BDP: Baja por adopción\
            \ (Low, due to adoption) - Inactive\n- BJD: Baja Judicial (Low for judicial\
            \ reasons) - Inactive"
          example: AN
