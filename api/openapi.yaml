            \ (nazwisko) is a separate idea from your birth\nfamily name (nazwisko\
            \ rodowe). They often match, but they can differ after marriage,\nadoption,\
            \ or a court-ordered change."
          example: Kowalski
          nullable: true
          type: string
        dateOfBirth:
          description: Date of birth as it appears on mobile ID (mDowód).
          example: 1980-10-20
          nullable: true
          type: string
        nationality:
          description: Nationality as it appears on mobile ID (mDowód).
          example: PL
          nullable: true
          type: string
        personalNumber:
          description: "Polish national identification number (PESEL) as it appears\
            \ on mobile ID (mDowód).\n            \nNOTE: The provided example value\
            \ is a randomly generated, but valid PESEL number that does not\ncorrespond\
            \ to a real person."
          example: "80102005992"
          nullable: true
          type: string
        expirationDate:
          description: Document expiration date as it appears on mobile ID (mDowód).
          example: 2030-12-31
          nullable: true
          type: string
        selfieBytes:
          description: The raw bytes of the selfie image collected from the user.
          format: byte
          nullable: true
          type: string
        selfieImageMimeType:
          description: "The MIME Type of the file contained in SelfieBytes.\n    \
            \        \nOnly JPEG or PNG formats are supported."
          nullable: true
