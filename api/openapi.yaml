    PolandMobywatelMatchProviderOutput:
      description: Exposed properties for the `poland-mobywatel-match` Provider which
        do not directly map to the normalized IdentityData model.
      properties:
        givenName:
          description: Given name as provided by the individual.
          example: Jan
          nullable: true
          type: string
        familyName:
          description: "Current legal family name (nazwisko) as provided by the individual.\n\
            \            \nIn Poland the current legal family name (nazwisko) is a\
            \ separate concept from your birth\nfamily name (nazwisko rodowe). They\
            \ often match, but they can differ after marriage,\nadoption, or a court-ordered\
            \ change."
          example: Kowalski
          nullable: true
          type: string
        nationality:
          description: Nationality as provided by the individual.
          example: PL
          nullable: true
          type: string
        dateOfBirth:
          description: Date of birth as provided by the individual.
          example: 1980-10-20
          format: date
          nullable: true
          type: string
        personalNumber:
          description: Personal number (PESEL) as provided by the individual.
          example: "80102005992"
          nullable: true
          type: string
        expirationDate:
          description: Expiration date as provided by the individual.
          example: 2030-12-31
          format: date
          nullable: true
          type: string
        isMatchForGivenNames:
          description: True when the provided given name matches mObywatel wallet
            data.
          example: true
          nullable: true
          type: boolean
        isMatchForFamilyName:
          description: True when the provided family name matches mObywatel wallet
            data.
          example: true
          nullable: true
          type: boolean
        isMatchForExpirationDate:
          description: True when the provided document expiration date matches mObywatel
            wallet data.
          example: true
          nullable: true
          type: boolean
        isMatchForPersonalNumber:
          description: True when the provided personal number (PESEL) matches mObywatel
            wallet data.
          example: true
          nullable: true
          type: boolean
        isMatchForNationality:
          description: True when the provided nationality matches mObywatel wallet
            data.
          example: true
          nullable: true
          type: boolean
        isMatchForBirthDate:
          description: True when the provided birth date matches mObywatel wallet
            data.
          example: true
          nullable: true
          type: boolean
        isMatchForSelfie:
          description: True when the face in the provided selfie matches the face
            in the document photo in mObywatel wallet.
          example: true
          nullable: true
          type: boolean
        isNotTooSimilarToDocumentPortrait:
          description: |-
            True when the uploaded face and wallet portrait are not suspiciously identical.
            Often fails when using a document photo as a selfie.
          example: true
          nullable: true
          type: boolean
        isNotDifferentFace:
          description: |-
            True when no other person's face has been used to verify this document (good).
            False when another person's face has been used to verify this document (possible fraud).
          example: true
          nullable: true
          type: boolean
        isSingleFace:
          description: |-
            True when exactly one face was detected on the selfie image (good).
            False when multiple faces were detected on the selfie image (ambiguous result).
          example: true
          nullable: true
          type: boolean
        isOverAge:
          description: True when the individual's age in digital wallet is over 18.
          example: true
          nullable: true
          type: boolean
        isAgeEstimationMatchForSelfie:
          description: True when the individual's age estimated from the selfie matches
            the individual's age in digital wallet.
          example: true
          nullable: true
          type: boolean
        ageEstimationThreshold:
          description: Number of years allowed between the individual's age in digital
            wallet and the individual's age estimated from the selfie.
          example: 4
          format: int32
          nullable: true
          type: integer
        estimatedAgeFromSelfie:
          description: "Estimated age from the selfie, if provided."
          example: 35
          format: int32
          nullable: true
          type: integer
      type: object
