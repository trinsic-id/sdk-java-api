    GuatemalaCuiLookupInput:
      properties:
        documentNumber:
          description: "The Guatemalan Código Único de Identificación (CUI) number.\n\
            \            \nAssigned and maintained by RENAP (Registro Nacional de\
            \ las Personas). Official format: exactly 13 numeric digits.\n8 RENAP-assigned\
            \ serial digits, 1 verifier digit (dígito verificador), and 4 geographic\
            \ digits for department\nand municipality of birth. The CUI is printed\
            \ on the Documento Personal de Identificación (DPI) in three groups\n\
            (4–5–4) separated by spaces.\n            \nTrinsic normalizes to digits-only\
            \ before lookup, automatically removing spaces, dots, hyphens, and other\n\
            non-alphanumeric characters.\n            \nNo verifier algorithm appears\
            \ in publicly accessible RENAP resources. Community-maintained validators\
            \ often use modulus-11\n(non-official)."
          example: "1234567890101"
          nullable: true
          type: string
      type: object
    GuatemalaCuiProviderOutput:
      description: Exposed properties for the `guatemala-cui-lookup` Provider which
        do not directly map to the normalized IdentityData model.
      properties:
        fullName:
          description: "Full name, including given and family names of the CUI holder."
          example: JUAN CARLOS PEREZ GARCIA
          type: string
        givenName:
          description: Given name(s) of the CUI holder.
          example: JUAN CARLOS
          type: string
        familyName:
          description: "Family name(s) of the CUI holder, including maternal and paternal\
            \ names."
          example: PEREZ GARCIA
          type: string
        dateOfBirth:
          description: Date of birth of the CUI holder.
          example: 1999-01-13
          format: date
          nullable: true
          type: string
        documentNumber:
          description: "The Guatemalan Código Único de Identificación (CUI) number.\n\
            \            \nAssigned and maintained by RENAP (Registro Nacional de\
            \ las Personas). Official format: exactly 13 numeric digits.\n8 RENAP-assigned\
            \ serial digits, 1 verifier digit (dígito verificador), and 4 geographic\
            \ digits for department\nand municipality of birth. The CUI is printed\
            \ on the Documento Personal de Identificación (DPI) in three groups\n\
            (4–5–4) separated by spaces.\n            \nTrinsic normalizes to digits-only\
            \ when returning the result, automatically removing spaces, dots, hyphens,\
            \ and other\nnon-alphanumeric characters.\n            \nNo verifier algorithm\
            \ appears in publicly accessible RENAP resources. Community-maintained\
            \ validators often use modulus-11\n(non-official)."
          example: "1234567890101"
          type: string
        serialDigits:
          description: |-
            The first 8 digits of the CUI: the portion RENAP assigns from its registration system, before the verifier
            digit and the four-place geographic codes. Called the “serial” numbers in community-maintained validators.
          example: "12345678"
          type: string
        verifierDigit:
          description: "The 9th digit of the CUI (verifier digit / dígito verificador).\
            \ No verifier algorithm appears in publicly accessible RENAP\nresources.\n\
            \            \nHowever, community-maintained validators often use modulus-11\
            \ (non-official)."
          example: "9"
          type: string
        geographicDigits:
          description: "The last four digits encode birthplace department and municipality.\
            \ There is not a publicly accessible\ndataset from RENAP for geographic\
            \ codes. The INE (Instituto Nacional de Estadística y Censos) provides\
            \ a dictionary\nof variables (Educación Formal 2024) that includes statistical\
            \ codes for decoding departments and municipalities.\nBe careful using\
            \ these resources, as these codes are not official RENAP codes. They may\
            \ not always map to the correct\ndepartment and municipality for consular\
            \ registrations, naturalizations, foreign residents, and other edge cases.\n\
            \            \nFor the dataset, see: https://datos.ine.gob.gt/dataset/educacion-formal-2024\
            \ under \"Diccionario de Variables (Educación Formal 2024)\""
          example: "0101"
          type: string
        sex:
          description: "Sex of the CUI holder.\n            \nPossible values:\n-\
            \ Male\n- Female\n- Unknown"
          example: Male
          type: string
        arrayName:
          description: "All names of the CUI holder, as an array of strings (e.g.\
            \ given and family name parts)."
          example:
          - JUAN
          - CARLOS
          - PEREZ
          - GARCIA
          items:
            type: string
          type: array
      required:
      - arrayName
      - documentNumber
      - familyName
      - fullName
      - geographicDigits
      - givenName
      - serialDigits
      - sex
      - verifierDigit
      type: object
