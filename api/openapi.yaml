    SwedenBankIdProviderOutput:
      description: Exposed properties for the `sweden-bankid` Provider which do not
        directly map to the normalized IdentityData model.
      properties:
        fullName:
          description: The full name of the individual.
          example: Ove Henriksen
          nullable: true
          type: string
        dateOfBirth:
          description: The date of birth of the individual.
          example: 1943-08-15
          format: date
          nullable: true
          type: string
        personalIdentityNumber:
          description: "The Swedish personal number (personnummer) associated with\
            \ the verified individual. The value is typically a 12-digit number.\n\
            This is in the format YYYYMMDDXXXX, where:\n- YYYYMMDD is the date of\
            \ birth.\n- XXXX is an individual number, indicating gender.\n       \
            \     \nIf XXXX is even, the individual is female.\nIf XXXX is odd, the\
            \ individual is male."
          example: 20200101-1231
          nullable: true
          type: string
        givenName:
          description: The given name of the individual
          example: Ove
          nullable: true
          type: string
        familyName:
          description: The family name of the individual
          example: Henriksen
          nullable: true
          type: string
        country:
          description: The individual's country on the verified certificate. This
            is ISO 2-character code of the country.
          example: SE
          nullable: true
          type: string
        certificatePolicy:
          description: The object identifier policy of the individual's verified certificate
          example: 1.2.752.78.1.1
          nullable: true
          type: string
        commonName:
          description: The common name of the individual's verified certificate
          example: Ove Henriksenn
          nullable: true
          type: string
        distinguishedName:
          description: The distinguished name of the individual's verified certificate
          example: "N=Ove Henriksen, OID.2.5.4.41=(180427 13.09) Ove Henriksen - BankID\
            \ på fil, SERIALNUMBER=19531​​0021935, GIVENNAME=Ove, SURNAME=Henriksen,\
            \ O=Testbank A AB (publ), C=SE ​"
          nullable: true
          type: string
        personalIdentityNumberIssuingCountry:
          description: The country that issued the Swedish personal number. This is
            an ISO 2-character code of the country and is extracted from the certificate.
            This will always be `SE`.
          example: SE
          nullable: true
          type: string
        authenticationDeviceIp:
          description: The IP address of the device used for authentication
          example: 192.168.1.100
          nullable: true
          type: string
        notBefore:
          description: The certificate validity start date (not before) in UTC
          example: 2024-01-01T00:00:00Z
          format: date-time
          nullable: true
          type: string
        notAfter:
          description: The certificate validity end date (not after) in UTC
          example: 2029-06-30T23:59:59Z
          format: date-time
          nullable: true
          type: string
      type: object
    TrinsicTestDatabaseLookupInput:
