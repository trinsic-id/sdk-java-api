          allOf:
          - $ref: "#/components/schemas/PeruDniAddress"
          description: "Information about the general area in which the DNI holder\
            \ resides.\n            \nThis field is not always available."
          example:
            region: CUSCO
            province: URUBAMBA
            district: MACHUPICCHU
          nullable: true
        arrayName:
          description: "All names that appear on DNI, as an array of strings.\n  \
            \          \nFormat:\n- All uppercase\n- Ordered by paternal family name,\
            \ then maternal family name, then given names."
          example:
          - QUISPE
          - MAMANI
          - JUAN
          - CARLOS
          items:
            type: string
          type: array
        civilStatus:
          description: "Marital status as it appears on the DNI.\n            \nThis\
            \ field is not always available.\n            \nValid values:\n- \"Single\"\
            \n- \"Married\"\n- \"Divorced\"\n- \"Widowed\""
          example: Single
          nullable: true
          type: string
        dateOfBirth:
          description: "Date of birth as it appears on the DNI.\n            \nThis\
            \ field is not always available."
          example: 1999-01-14
          format: date
          nullable: true
          type: string
        documentNumber:
          description: "The individual's National Identity Document number (Documento\
            \ Nacional de Identidad or DNI).\n            \nFormat:\n- 8 digits\n\
            - Does NOT include verification digit. On the DNI card, a ninth digit\
            \ appears next to the first eight. It is\n  0-9 or A-K. This is NOT included\
            \ in the DNI number when returned from Peru's database.\n- Does NOT include\
            \ dots or hyphens"
          example: "19050215"
          type: string
        documentType:
          description: Should always be "DNI".
          example: DNI
          type: string
        expeditionDate:
          description: "Date that the DNI was issued.\n            \nThis field is\
            \ not always available.\n            \nFormat:\n- yyyy-MM-dd"
          example: 2025-01-14
          format: date
          nullable: true
          type: string
        expirationDate:
          description: "Date that the DNI will expire. DNI expires every 8 years,\
            \ unless the citizen is >= 60 years old, in which case\nit never expires.\n\
            \            \nThis field is not always available.\n            \nFormat:\n\
            - yyyy-MM-dd"
          example: 2033-01-14
          format: date
          nullable: true
          type: string
        firstName:
          description: "Given names as they appear on DNI.\n            \nFormat:\n\
            - All uppercase\n- Space-separated\n- Will include all given names"
          example: JUAN CARLOS
          type: string
        fullName:
          description: "All names as they appear on DNI.\n            \nFormat:\n\
            - All uppercase\n- Space-separated\n- Will include all names, given and\
            \ family\n- Ordered by given names first, then paternal family name, then\
            \ maternal family name"
          example: JUAN CARLOS QUISPE MAMANI
          type: string
        lastName:
          description: "Family names as they appear on DNI.\n            \nFormat:\n\
            - All uppercase\n- Will include all family names\n- Ordered by paternal\
            \ family name first, then maternal family name"
          example: QUISPE MAMANI
          type: string
        maternalLastName:
          description: "Maternal last name as it appears on DNI.\n            \nFormat:\n\
            - All uppercase"
          example: MAMANI
          type: string
        paternalLastName:
          description: "Paternal last name as it appears on DNI.\n            \nFormat:\n\
            - All uppercase"
          example: QUISPE
          type: string
        sex:
          description: "Sex as it appears on DNI.\n            \nThis field is not\
            \ always available.\n            \nValues:\n- \"Male\"\n- \"Female\""
          example: Male
          nullable: true
          type: string
        ubigeoReniec:
          description: "In Peru, geographical locations have an official geographical\
            \ code called UBIGEO, from the spanish \"UBIcación\nGEOgráfica\" (Geographic\
            \ Location). This is an administrative geocode, is different from a postal\
            \ code (which\nPeru also has) and is used to specifically delineate the\
            \ administrative region, province and district hierarchy.\n          \
            \  \nThere are two coding systems for UBIGEO: one from INEI (National\
            \ Institute of Statistics and Informatics) and\nanother from RENIEC (National\
            \ Registry of Identification and Civil Status). The two coding systems\
            \ are similar\nbut are not 100% the same (some numbers will map to different\
            \ geographic locations). This field follows the\ncoding system from RENIEC.\n\
            \            \nThis field is not always available.\n            \nFormat:\n\
            - Always 6 digits\n- First two digits represent region\n- Middle two are\
            \ province\n- Last two are district\n            \nGiven the example 081304,\
            \ that would correspond to:\n- 08 - Cusco Region\n- 0813 - Urubamba Province\n\
            - 081304 - Machupicchu District"
          example: "081304"
          nullable: true
          type: string
        verificationDigit:
          description: "The final (ninth) digit of the DNI, which serves as a checksum\
            \ over the first eight digits.\n            \nThis field is not always\
            \ available.\n            \nFormat:\n- Single character\n- Either 0-9\
            \ or A-K\n            \nRead more here:\n  https://elcomercio.pe/mag/respuestas/cual-es-el-digito-verificador-de-mi-dni-documento-nacional-de-identidad-reniec-peru-nnda-nnlt-noticia/"
          example: "7"
          nullable: true
          type: string
      required:
      - arrayName
      - documentNumber
      - documentType
      - firstName
      - fullName
      - lastName
      - maternalLastName
      - paternalLastName
      type: object
