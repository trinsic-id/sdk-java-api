        nationalIdentityNumber:
          description: "National Identification Number (NIN).\n            \nThis\
            \ is a unique, permanent identifier assigned by the National Identity\
            \ Management Commission\nupon enrollment.\n            \nFormat: 11 numeric\
            \ digits (regex: /^[0-9]{11}$/). The digits are validated using the Verhoeff\n\
            algorithm, meaning the last digit serves as a check digit."
          example: "12345678901"
