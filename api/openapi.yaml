            notBefore: 2023-03-01T17:17:39.000Z
            notAfter: 2033-01-07T17:17:39.000Z
        documentSignerCertificate:
          allOf:
          - $ref: "#/components/schemas/MdlOutputCertificateData"
          description: Information about the Document Signer Certificate which signed
            the mDL presented by the individual.
          example:
            serialNumber: "306801082360131207284784033026769989720690200468"
            commonName: California DMV IACA mdoc Signer
            stateOrProvinceName: US-CA
            notBefore: 2025-01-13T17:26:32.000Z
            notAfter: 2026-04-13T17:26:32.000Z
        documentType:
          description: "The document type of the mDL presented by the individual.\n\
            \            \nCommon values:\n- \"org.iso.18013.5.1.mDL\" for ISO 18013-5\
            \ mDLs\n- \"com.google.wallet.idcard.1\" for Google Wallet ID Cards"
          example: org.iso.18013.5.1.mDL
          type: string
        nameSpaces:
          additionalProperties:
            additionalProperties:
              $ref: "#/components/schemas/MdlOutputFieldData"
            type: object
          description: "The namespaces, and fields within those namespaces, which\
            \ were present in the processed mDL."
          example:
            org.iso.18013.5.1:
              family_name:
                type: String
                value: DOE
              given_name:
                type: String
                value: JOHN
              birth_date:
                type: String
                value: 2000-03-27
              age_over_21:
                type: Boolean
                value: "true"
          type: object
      required:
      - documentSignerCertificate
      - documentType
      - iacaRootCertificate
      - nameSpaces
      type: object
    MdlOutputCertificateData:
      properties:
        serialNumber:
          description: The serial number of the certificate
          example: "535868140170056787981774412188464491855209169584"
          type: string
        commonName:
          description: The common name (CN) of the certificate
          example: California DMV IACA Root
          type: string
        stateOrProvinceName:
          description: "The stateOrProvinceName field from the signing certificate.\n\
            \            \nPer the ISO 18013-5 (mDL) spec, this is an ISO 3166-2:2020\
            \ country subdivision code (e.g., \"US-CA\" for California, USA).\n  \
            \          \nMay be an empty string for certificates which are not state-specific\
            \ (e.g., Google Wallet's ID Pass certificates)."
          example: US-CA
          type: string
        notBefore:
          description: The date before which this certificate is not valid.
          example: 2023-03-01T17:17:39Z
          format: date-time
          type: string
        notAfter:
          description: The date after which this certificate is not valid.
          example: 2033-01-07T17:17:39Z
          format: date-time
          type: string
      required:
      - commonName
      - notAfter
      - notBefore
      - serialNumber
      - stateOrProvinceName
      type: object
    MdlOutputFieldData:
      properties:
        type:
          allOf:
          - $ref: "#/components/schemas/MdlOutputFieldDataType"
          description: The type of data contained in `value`.
          example: String
          x-enumDescriptions:
            String: "A raw string value, e.g. \"John\""
            Boolean: "A boolean value, e.g. \"true\""
            Number: "A numeric value, e.g. \"1234.56\", \"-1\", \"53\""
            Base64Url: "Base64url-encoded binary data, e.g. a JPEG image."
            EncodedCbor: "An encoded CBOR object which cannot be cleanly represented\
              \ as a simple string.\n            \nWhen this type is used, the `value`\
              \ field contains a base64url-encoded byte array of the raw CBOR data."
            IntentionallyOmitted: "Indicates that Trinsic intentionally omitted the\
              \ field's value from the raw mDL output.\n            \nThis is only\
              \ done for large field values which are already surfaced via Trinsic's\
              \ Attachments API, such as `portrait`.\n            \nThe presence of\
              \ this field indicates that the data was returned by the mDL, but has\
              \ been omitted to reduce payload size.\n            \nUse the Attachments\
              \ API to fetch this field."
        value:
          description: The string-encoded value of the field.
          example: 123 Fake St
          type: string
      required:
      - type
      - value
      type: object
    MdlOutputFieldDataType:
      enum:
      - String
      - Boolean
      - Number
      - Base64Url
      - EncodedCbor
      - IntentionallyOmitted
      type: string
      x-enumDescriptions:
        String: "A raw string value, e.g. \"John\""
        Boolean: "A boolean value, e.g. \"true\""
        Number: "A numeric value, e.g. \"1234.56\", \"-1\", \"53\""
        Base64Url: "Base64url-encoded binary data, e.g. a JPEG image."
        EncodedCbor: "An encoded CBOR object which cannot be cleanly represented as\
          \ a simple string.\n            \nWhen this type is used, the `value` field\
          \ contains a base64url-encoded byte array of the raw CBOR data."
        IntentionallyOmitted: "Indicates that Trinsic intentionally omitted the field's\
          \ value from the raw mDL output.\n            \nThis is only done for large\
          \ field values which are already surfaced via Trinsic's Attachments API,\
          \ such as `portrait`.\n            \nThe presence of this field indicates\
          \ that the data was returned by the mDL, but has been omitted to reduce\
          \ payload size.\n            \nUse the Attachments API to fetch this field."
