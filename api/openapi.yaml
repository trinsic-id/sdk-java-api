            Unverified addresses may be safe to use. For example, Aadhaar card provides an address, but due to certain limitations of verifying Aadhaar, Yoti is unable to verify this property so it is listed as "unverified".
          nullable: true
        postalAddress:
          description: |-
            The whole address for the individual that comes from the underlying document or can be manually added. In the case of being manually added, the address is considered "unverified". The format of this will be different for each country.
            Refer to `StructuredPostalAddress` for a detailed version of the address.
          example: "6th Floor, 107 Leadenhall St, London, EC3A 4AF"
          nullable: true
          type: string
        documentDetails:
          allOf:
          - $ref: "#/components/schemas/YotiDocumentDetails"
          description: The details of the underlying document used to help create
            the Yoti credential
          nullable: true
      type: object
    YotiStructuredPostalAddress:
      properties:
        country:
          description: "The address's country. This field does not have a specified\
            \ format, but is recommended to use for the country field."
          example: UK
          nullable: true
          type: string
        countryIso:
          description: The address's ISO alpha-3 country code
          example: USA
          nullable: true
          type: string
        formattedAddress:
          description: "The whole address in proper order and formatted with line\
            \ breaks.\n            \nExamples:\nUnited Kingdom: \"15a North Street\\\
            nCARSHALTON\\nSM5 2HW\\nUK\"\nIndia: \"S/O: Vipen Kumar Aggarwal\\nHouse\
            \ No.86-A\\nRajguru Nagar\\nLudhiana\\nPunjab\\n141012\\nIndia\"\nUnited\
            \ States of America: \"1512 Ferry Street\\nAnniston AL 36201\\nUSA\""
          example: 15a North Street\nCARSHALTON\nSM5 2HW\nUK
          nullable: true
          type: string
        line1:
          description: The first line of the address
          example: 15a North Street
          nullable: true
          type: string
        line2:
          description: The second line of the address
          example: 15a North Street
          nullable: true
          type: string
        line3:
          description: The third line of the address
          example: 15a North Street
          nullable: true
          type: string
        line4:
          description: The fourth line of the address
          example: 15a North Street
          nullable: true
          type: string
        townCity:
          description: The address's town or city
          example: Los Angeles
          nullable: true
          type: string
        state:
          description: The address's state. This is an optional field that may only
            appear for US addresses.
          example: CA
          nullable: true
          type: string
        postalCode:
          description: The address's postal code
          example: SM5 2HW
          nullable: true
          type: string
        buildingNumber:
          description: The address's building number
          example: 15a
          nullable: true
          type: string
        building:
          description: The address's building name
          example: House No.86-A
          nullable: true
          type: string
        subBuilding:
          description: The address's sub building or specific part of the building
          example: Apt 4B
          nullable: true
          type: string
        locality:
          description: "The address'ss locality can be an area, a village, a region,\
            \ or a known neighborhood"
          example: FRAMINGHAM PIGOT
          nullable: true
          type: string
        deliveryPointReferenceNumber:
          description: The unique delivery point reference number. This is an 8-digit
            code used in the UK for identifying delivery addresses.
          example: "23747208"
          nullable: true
          type: string
        landmark:
          description: The address's landmark. A landmark is a recognizable feature
            or place that helps locate the address. This optional field may appear
            only for Indian addresses.
          example: Behind Bank XYZ
          nullable: true
          type: string
        subdistrict:
          description: The address's subdistrict. This optional field may appear only
            for Indian addresses.
          example: Ludhiana
          nullable: true
          type: string
        district:
          description: The address's district. This optional field may appear only
            for Indian addresses.
          example: Ludhiana
          nullable: true
          type: string
        postOffice:
          description: The address's post office. This optional field may appear only
            for Indian addresses.
          example: Rajguru Nagar
          nullable: true
          type: string
        careOf:
          description: |-
            The address's care-of field. This indicates that mail should be delivered to an individual through another person or entity who is a known resident at the address.
            This optional field may appear only for Indian addresses.
          example: Jane Doe
          nullable: true
          type: string
      type: object
    ZimbabweNidLookup2Input:
      properties:
        idNumber:
          description: The user's National ID number
          nullable: true
          type: string
      type: object
    CreateVerificationProfile_request:
      properties:
        Alias:
          description: An alias of the verification profile shown to developers and
            administrators.
          maxLength: 255
          minLength: 1
          type: string
        BrandName:
          description: The brand name of the verification profile shown to end-users.
          maxLength: 2500
          minLength: 1
          type: string
        PrimaryColor:
          description: |-
            The primary color of the verification profile. Must be a 6-character hex string prefixed with a '#' character.
            Example: #000000
          maxLength: 7
          minLength: 7
          type: string
        ExternalId:
          description: |-
            A customer-defined external ID for this verification profile.
            Must be unique within your organization and be at most 255 characters long.
          maxLength: 255
          type: string
        Providers:
          description: The list of providers you'd like to select for this profile.
            We will not currently enable any providers.
          items:
            type: string
          type: array
        Logo:
          description: The logo of the verification profile.
          format: binary
          type: string
        RedactionPeriod:
          description: |-
            The redaction period for verification data.
            Must be between 0 and 31 days, and at least 15 minutes greater than the session expiration.
            If not specified, defaults to 31 days.
          format: date-span
          type: string
        SessionExpiration:
          description: |-
            The session expiration for verification sessions created with this profile.
            Must be between 15 minutes and 24 hours. Defaults to 1 hour if not specified.
          format: date-span
          type: string
        IsProductionUsage:
          description: |-
            Whether this profile is for production usage. Only applicable for Live environment profiles.
            If not specified for Live profiles, defaults to false (Demo).
          type: boolean
      required:
      - Alias
      - BrandName
      type: object
  securitySchemes:
    Bearer:
      description: Trinsic Connect API Key
      scheme: bearer
      type: http

