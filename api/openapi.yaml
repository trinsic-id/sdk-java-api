    Raw18013DocumentRequest:
      properties:
        documentType:
          description: "The type of the document being requested, as defined by ISO\
            \ specifications 18013-5, 18013-7, 23220-2, or a similar or related standard.\n\
            \            \nCommon values:\n- \"org.iso.18013.5.1.mDL\" -- a Mobile\
            \ Driver's License\n- \"eu.europa.ec.eudi.pid.1\" -- an EUDI Wallet PID\n\
            - \"com.google.wallet.idcard.1\" -- a Google Wallet ID Pass\n- \"org.iso.23220.photoid.1\"\
            \ -- a generic ISO 23220-2 compliant Photo ID (used by Apple Wallet's\
            \ ID Pass)"
          example: org.iso.18013.5.1.mDL
          minLength: 1
          type: string
        nameSpaces:
          additionalProperties:
            additionalProperties:
              type: boolean
            type: object
          description: "The namespaces and attributes (PII) to request from the document.\n\
            \            \nThis is a map of (nameSpaceName -> (attributeName -> willRetain)),\
            \ where:\n            \n- nameSpaceName is the name of a NameSpace within\
            \ the document\n- attributeName is the name of a specific attribute within\
            \ the NameSpace\n- willRetain indicates, to the Wallet, whether you as\
            \ the Relying Party intend to retain the data for longer than the scope\
            \ of the transaction\n            \nCommon namespace values:\n- \"org.iso.18013.5.1\"\
            \ -- the primary namespace of a Mobile Driver's License or a Google Wallet\
            \ ID Pass\n- \"org.iso.18013.5.1.aamva\" -- the secondary, AAMVA-defined\
            \ namespace of a Mobile Driver's License\n- \"eu.europa.ec.eudi.pid.1\"\
            \ -- the primary namespace of an EUDI Wallet PID\n- \"org.iso.23220.1\"\
            \ -- the primary namespace of an ISO 23220-2 credential or an Apple Wallet\
            \ ID Pass"
          example:
            org.iso.18013.5.1:
              given_name: true
              family_name: true
              portrait: false
            org.iso.18013.5.1.aamva:
              name_suffix: true
          minLength: 1
          type: object
      required:
      - documentType
      - nameSpaces
      type: object
    Raw18013RequestInput:
      description: "A raw 18013-7 exchange request.\n            \nUse this to specify\
