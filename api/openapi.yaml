    SmartIdInput:
      properties:
        smartIdNumber:
          description: The user's Smart ID ETSI number or document number.
          nullable: true
          type: string
      type: object
    SmartIdProviderOutput:
      description: Exposed properties for the `smart-id` Provider which do not directly
        map to the normalized IdentityData model.
      properties:
        givenName:
          description: |-
            The given name (first name) of the individual, extracted from the Smart ID
            authentication certificate's Subject Distinguished Name "G" (givenName) attribute.
          example: MARI
          nullable: true
          type: string
        familyName:
          description: |-
            The family name (surname) of the individual, extracted from the Smart ID
            authentication certificate's Subject Distinguished Name "SN" (surname) attribute.
          example: TAMM
          nullable: true
          type: string
        dateOfBirth:
          description: "The individual's date of birth, derived from the personal\
            \ code.\n            \nNOTE: Newer Latvian personal codes starting with\
            \ \"32\" do not contain\ndate of birth information."
          example: 1985-01-01
          format: date
          nullable: true
          type: string
        sex:
          description: "The individual's sex, derived from the first digit of the\
            \ personal code.\n            \nNOTE: Not available for Latvian personal\
            \ codes.\n            \nPossible values:\n- Male\n- Female"
          example: Female
          nullable: true
          type: string
        country:
          description: "The ISO 3166-1 alpha-2 country code extracted from the Smart\
            \ ID authentication\ncertificate's Subject Distinguished Name \"C\" (country)\
            \ attribute.\n            \nThis represents the country of the certificate\
            \ issuer, not the person's nationality\nor citizenship. For Smart ID,\
            \ this will be \"EE\" (Estonia), \"LT\" (Lithuania), or\n\"LV\" (Latvia)."
          example: EE
          nullable: true
          type: string
        identityType:
          description: "The identity document type, extracted from the first 3 characters\
            \ of the\nSERIALNUMBER field (before the country code).\n            \n\
            Possible values:\n- PNO: Personal Number (national civic registration\
            \ number)\n- PAS: Passport\n- IDC: National identity card"
          example: PNO
          nullable: true
          type: string
        personalCode:
          description: "The personal code (Estonian: isikukood, Lithuanian: asmens\
            \ kodas, Latvian: personas kods)\nof the individual, extracted from the\
            \ SERIALNUMBER field of the Smart ID authentication\ncertificate. This\
            \ is the portion after the identity type and country prefix\n(e.g., \"\
            48501010014\" from \"PNOEE-48501010014\").\n            \nEstonian and\
            \ Lithuanian personal codes are 11 digits in the format GYYMMDDSSSC where:\n\
            - G = century/gender (3-4 = 1900s, 5-6 = 2000s; odd = male, even = female)\n\
            - YYMMDD = date of birth\n- SSS = sequence number\n- C = checksum digit\n\
            \            \nLatvian personal codes use the format DDMMYY-NNNNN (6 digits,\
            \ a dash, and 5 digits).\n            \nSee:\n- https://en.wikipedia.org/wiki/National_identification_number#Estonia\n\
            - https://en.wikipedia.org/wiki/National_identification_number#Lithuania\n\
            - https://en.wikipedia.org/wiki/National_identification_number#Latvia"
          example: "48501010014"
          nullable: true
          type: string
        serialNumber:
          description: "The SERIALNUMBER attribute from the Smart ID authentication\
            \ certificate's Subject\nDistinguished Name. Format: \"{identity-type}{country-code}-{identifier}\"\
            \n            \nComponents:\n- identity-type (3 chars): PNO (Personal\
            \ Number), PAS (Passport), IDC (ID Card)\n- country-code (2 chars): ISO\
            \ 3166-1 alpha-2 (EE, LT, LV)\n- identifier: The personal code"
          example: PNOEE-48501010014
          nullable: true
          type: string
        certificateSubject:
          description: |-
            The full Subject Distinguished Name (Subject DN) from the Smart ID
            authentication certificate. Contains comma-separated RDN (Relative Distinguished Name)
            components including C (Country), CN (Common Name), SN (Surname), G (Given Name),
            and SERIALNUMBER (Personal identifier).
          example: "SERIALNUMBER=PNOEE-48501010014, G=MARI, SN=TAMM, CN=\"TAMM,MARI,48501010014\"\
            , C=EE"
          nullable: true
          type: string
        certificateLevel:
          description: "The certificate level indicating the authentication assurance\
            \ level.\n            \nPossible values:\n- QUALIFIED: Highest assurance\
            \ level (eIDAS QES - Qualified Electronic Signature),\n  legally equivalent\
            \ to a handwritten signature. This is the standard production level.\n\
            - ADVANCED: Lower assurance level (eIDAS AdES), also called \"Smart-ID\
            \ Basic\".\n  Only available in test environments for test accounts."
          example: QUALIFIED
          nullable: true
          type: string
        documentNumber:
          description: "A unique identifier for the Smart ID account/document used\
            \ for this authentication.\nFormat: PNO{CC}-{personal-code}-{device-id}-{qualification}\n\
            \            \nComponents:\n- PNO = Personal Number (identity type)\n\
            - CC = Country code (EE, LT, LV)\n- personal-code = The individual's personal\
            \ code\n- device-id = Random 4-character device identifier\n- qualification\
            \ = NQ (non-qualified) or Q (qualified certificate)\n            \nThis\
            \ is a stable identifier that can be used to recognize returning individuals\
            \ across sessions."
          example: PNOEE-48501010014-Z1B2-Q
          nullable: true
          type: string
        interactionFlowUsed:
          description: "Indicates which interaction flow was used during the Smart\
            \ ID authentication process.\nThis reflects which of the allowedInteractionsOrder\
            \ options was actually used.\n            \nPossible values:\n- displayTextAndPIN:\
            \ User saw text and entered PIN\n- verificationCodeChoice: User selected\
            \ from multiple verification codes\n- confirmationMessage: User confirmed\
            \ a message\n- confirmationMessageAndVerificationCodeChoice: Combination\
            \ of both"
          example: displayTextAndPIN
          nullable: true
          type: string
        deviceIpAddress:
          description: |-
            The IP address of the device where the Smart ID app was used for authentication.
            Can be IPv4 or IPv6 format.
          example: 192.168.1.100
          nullable: true
          type: string
      type: object
    SouthAfricaNidBiometric2Input:
      properties:
        idNumber:
          description: The user's South African National ID number
          nullable: true
          type: string
        livenessImages:
          description: |-
            An array of exactly 8 images required for biometric liveness verification.
            The first 7 images should be liveness frames captured during the liveness detection process,
            and the last image (8th) should be a selfie of the user. All images must be in JPEG format
            and each image must be less than 15MB in size.
          items:
            format: byte
            type: string
          nullable: true
          type: array
        testSelfie:
          description: "Test selfie for test environment (optional, maximum 15MB).\
            \ Must be JPEG format."
          format: byte
          nullable: true
          type: string
      type: object
