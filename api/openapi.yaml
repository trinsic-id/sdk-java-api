    SingpassMyInfoRegisteredAddressOutput:
      description: The structured MyInfo registered address payload.
      properties:
        type:
          description: "The address type.\n            \nPossible values:\n- SG (Structured\
            \ Address)\n- UNFORMATTED\n            \nStructured addresses most likely\
            \ will be a Singapore address.\nUnformatted are typically a non-Singapore\
            \ address, however it might still be an unformatted Singapore address."
          example: SG
          nullable: true
          type: string
        block:
          description: "The block number.\n            \nThis will only be present\
            \ if the type is \"SG\""
          example: "548"
          nullable: true
          type: string
        building:
          description: "The building name.\n            \nThis will only be present\
            \ if the type is \"SG\""
          example: Bedok Mall
          nullable: true
          type: string
        floor:
          description: "The floor number.\n            \nThis will only be present\
            \ if the type is \"SG\""
          example: "09"
          nullable: true
          type: string
        unit:
          description: "The unit number.\n            \nThis will only be present\
            \ if the type is \"SG\""
          example: "128"
          nullable: true
          type: string
        street:
          description: "The street name.\n            \nThis will only be present\
            \ if the type is \"SG\""
          example: BEDOK NORTH AVENUE 1
          nullable: true
          type: string
        postal:
          description: "The postal code.\n            \nThis will only be present\
            \ if the type is \"SG\""
          example: "460548"
          nullable: true
          type: string
        country:
          description: "The ISO-2 country code and description for the address.\n\
            \            \nThis will only be present if the type is \"SG\""
          example: SG
          nullable: true
          type: string
        line1:
          description: "The first line of the unformatted address.\n            \n\
            This will only be present if the type is \"UNFORMATTED\""
          example: 123 Market St.
          nullable: true
          type: string
        line2:
          description: "The second line of the unformatted address.\n            \n\
            This will only be present if the type is \"UNFORMATTED\""
          example: "San Francisco, CA 81111 US"
          nullable: true
          type: string
      type: object
    SingpassPersonalCatalog:
      description: MyInfo Personal catalog.
      properties:
        identityNumber:
          description: "The Unique Identifier Number (UINFIN) for the user.\n    \
            \        \nThe number can be either a National Registration Identity Card\
            \ or a Foreign Identification Number (NRIC/FIN).\nFollows the format @xxxxxxx#:\n\
            - @ is the status of the holder.\n    - Singapore citizens and permanent\
            \ residents born before 1 January 2000 are assigned the letter \"S\".\n\
            \    - Singapore citizens and permanent residents born on or after 1 January\
            \ 2000 are assigned the letter \"T\".\n    - Foreigners issued with long-term\
            \ passes before 1 January 2000 are assigned the letter \"F\".\n    - Foreigners\
            \ issued with long-term passes from 1 January 2000 to 31 December 2021\
            \ are assigned the letter \"G\".\n    - Foreigners issued with long-term\
            \ passes on or after 1 January 2022 are assigned the letter \"M\".\n-\
            \ xxxxxxx is seven digit serial number.\n- # is the checksum letter."
          example: S1234567A
          nullable: true
          type: string
        partialIdentityNumber:
          description: "The partial National Registration Identity Card or Foreign\
            \ Identification Number (NRIC/FIN) shown by Singpass.\n            \n\
            The value hides all but the last three digits and checksum."
          example: '*****567A'
          nullable: true
          type: string
        name:
          description: "The name of verified individual composed of all the possible\
            \ names.\n            \nThe name is assembled in the following format\
            \ (where applicable):\n1. Principal Name (The first name section)\n2.\
            \ Hanyu Pinyin Name\n3. Alias Name\n4. Hanyu Pinyin Alias Name\n5. Married\
            \ Name (optional): Available only for females, prefixed with \"MRS\""
          example: CHEN PEI NI (CHEN PEI NI) @ LEE PEI HUI (LI PEI HUI) MRS TAN
          nullable: true
          type: string
        aliasName:
          description: The individual's alternate legally recognized name.
          example: LEE PEI HUI
          nullable: true
          type: string
        hanyuPinyinName:
          description: The individual's Hanyu Pinyin name.
          example: LI PEI HUI
          nullable: true
          type: string
        hanyuPinyinAliasName:
          description: The individual's Hanyu Pinyin alias name.
          example: LI PEI HUI
          nullable: true
          type: string
        marriedName:
          description: "The individual's married name.\n            \nThis appears\
            \ when Singpass has a legally recognized married surname on file."
          example: MRS TAN
          nullable: true
          type: string
        email:
          description: The user's email address.
          example: myinfotesting@gmail.com
          nullable: true
          type: string
        mobileNumber:
          allOf:
          - $ref: "#/components/schemas/SingpassPhoneNumber"
          description: "The user's mobile number, split into prefix, area code, and\
            \ subscriber number."
          example:
            prefix: "+"
            areaCode: "65"
            number: "97399245"
          nullable: true
        dialect:
          allOf:
          - $ref: "#/components/schemas/SingpassMyInfoDescription"
          description: The user's dialect.
          example:
            code: H
            description: HAINANESE
          nullable: true
        dateOfBirth:
          description: The user's date of birth.
          example: 1990-03-03
          format: date
          nullable: true
          type: string
        residentialStatus:
          allOf:
          - $ref: "#/components/schemas/SingpassMyInfoDescription"
          description: "The user's residential status.\n            \nPossible values\
            \ (code description):\n- A\tAlien\n- C Citizen\n- P PR\n- U Unknown\n\
            - N NOT APPLICABLE"
          example:
            code: C
            description: Citizen
          nullable: true
        nationality:
          description: The user's nationality in IS0-2 country code format.
          example: SG
          nullable: true
          type: string
        birthCountry:
          description: The user's birth country in IS0-2 country code format.
          example: SG
          nullable: true
          type: string
        passportNumber:
          description: The user's passport number.
          example: E35463874W
          nullable: true
          type: string
        passportExpiryDate:
          description: The user's passport expiry date.
          example: 2030-01-01
          format: date
          nullable: true
          type: string
        passType:
          allOf:
          - $ref: "#/components/schemas/SingpassMyInfoDescription"
          description: "The Pass type of the individual.\n            \nPossible values:\
            \ (code description)\n            \n- RPass\tWork Permit\n- SPass S Pass\n\
            - P1Pass Employment Pass\n- P2Pass Employment Pass\n- QPass Employment\
            \ Pass\n- PEP Personalised Employment Pass\n- WHP Work Holiday Pass\n\
            - TEP Training Employment Pass\n- Entre EntrePass\n- OVE Overseas Networks\
            \ & Expertise Pass\n- DP Dependent Pass\n- LTVP Long-Term Visit Pass\n\
            - LOC Letter of Consent\n- MWP Miscellaneous Work Pass\n- STP Student's\
            \ Pass\n- LTVP+ Long-Term Visit Pass Plus\n- IEO Immigration Exemption\
            \ Order\n            \nNote that this only applies to a FIN holder."
          example:
            code: P1Pass
            description: Employment Pass
          nullable: true
        passStatus:
          description: "Pass status.\n            \nPossible values:\n- Live\n- Approved\
            \ (Interim status in which the FIN holder has yet to receive the pass)\n\
            \            \nNote that this only applies to a FIN holder."
          example: Live
          nullable: true
          type: string
        passExpiryDate:
          description: "Pass expiration date.\n            \nNote that this only applies\
            \ to a FIN holder."
          example: 2030-12-31
          format: date
          nullable: true
          type: string
        employmentSector:
          description: The user's employment sector.
          example: Technology
          nullable: true
          type: string
        registeredAddress:
          allOf:
          - $ref: "#/components/schemas/SingpassMyInfoRegisteredAddressOutput"
          description: The user's registered address.
          nullable: true
        houseDevelopmenetBoardType:
          allOf:
          - $ref: "#/components/schemas/SingpassMyInfoDescription"
          description: "Housing and Development Board (HBD) flat type code and description.\n\
            \            \nThis value will be null if not HBD\nPossible values (code\
            \ description):\n- 111 1-ROOM FLAT (HDB)\n- 112 2-ROOM FLAT (HDB)\n- 113\
            \ 3-ROOM FLAT (HDB)\n- 114 4-ROOM FLAT (HDB)\n- 115 5-ROOM FLAT (HDB)\n\
            - 116 EXECUTIVE FLAT (HDB)\n- 118 STUDIO APARTMENT (HDB)"
          example:
            code: "113"
            description: 3-ROOM FLAT (HBD)
          nullable: true
        housingType:
          allOf:
          - $ref: "#/components/schemas/SingpassMyInfoDescription"
          description: "The user's housing type.\n            \nPossible values (code\
            \ description):\n- 121 DETACHED HOUSE\n- 122 SEMI-DETACHED HOUSE\n- 123\
            \ TERRACE HOUSE\n- 131 CONDOMINIUM\n- 132 EXECUTIVE CONDOMINIUM\n- 139\
            \ APARTMENT"
          example:
            code: TH
            description: TERRACE HOUSE
          nullable: true
        sex:
          description: "Sex of the individual.\n            \nPossible values:\n-\
            \ Female\n- Male\n- Unknown"
          example: 'Female '
          nullable: true
          type: string
      type: object
    SingpassPhoneNumber:
