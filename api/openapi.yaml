components:
  schemas:
    AadhaarAddress:
      description: The structured Indian address.
      properties:
        careOf:
          description: The address's care-of field. This indicates that mail should
            be delivered to an individual through another person or entity who is
            a known resident at the address.
          example: "S/O: Priya Kumari"
          nullable: true
          type: string
        country:
          description: "The address's country.\n            \nThis is usually formatted\
            \ as an alpha-2 country code, but localized output may instead contain\
            \ the country name as written on the document."
          example: IN
          nullable: true
          type: string
        district:
          description: The address's district.
          example: Ludhiana
          nullable: true
          type: string
        house:
          description: The identifier for the house address.
          example: "12"
          nullable: true
          type: string
        location:
          description: The location or locality that helps identify where the address
            is within a city.
          example: Rajguru Nagar
          nullable: true
          type: string
        landmark:
          description: A landmark near the address.
          example: Near City Mall
          nullable: true
          type: string
        postalCode:
          description: The address's postal code.
          example: "226010"
          nullable: true
          type: string
        postOffice:
          description: The address's post office.
          example: Rajguru Nagar
          nullable: true
          type: string
        state:
          description: The address's state or union territory.
          example: Jammu and Kashmir
          nullable: true
          type: string
        street:
          description: The address's street name.
          example: MG Road
          nullable: true
          type: string
        subdistrict:
          description: The address's subdistrict.
          example: Ludhiana
          nullable: true
          type: string
        villageTownCity:
          description: The address's village/town/city.
          example: Malota
          nullable: true
          type: string
      type: object
    AadhaarClaims:
      properties:
        name:
          description: The full name.
          example: Rajesh Kumar
          nullable: true
          type: string
        dateOfBirth:
          description: "The date of birth.\n            \nThe format is YYYY-MM-DD."
          example: 1943-08-15
          format: date
          nullable: true
          type: string
        gender:
          description: "The gender of the individual.\n            \nPossible values:\n\
            - M (Male)\n- F (Female)\n- T (Transgender)"
          example: M
          nullable: true
          type: string
        address:
          allOf:
          - $ref: "#/components/schemas/AadhaarAddress"
          description: The structured Indian address.
          example:
            careOf: "S/O: Priya Kumari"
            country: IN
            district: Ahmedabad
            house: "12"
            location: Navrangpura
            landmark: Near City Mall
            postalCode: "226010"
            postOffice: Navrangpura
            state: Gujarat
            street: Mahatma Gandhi Road
            subdistrict: Vejalpur
            villageTownCity: Ahmedabad
          nullable: true
      type: object
    AadhaarInput:
      properties:
        fullName:
          description: The user's full name
          nullable: true
          type: string
        dateOfBirth:
          description: "The user's date of birth, in `YYYY-MM-DD` format"
          format: date
          nullable: true
          type: string
      type: object
    AadhaarLanguage:
      description: The language used for the localized claims.
      properties:
        languageCode:
          description: The language code for the localized claims.
          example: "05"
          nullable: true
          type: string
        languageName:
          description: "The language name for the localized claims.\n            \n\
            This is Trinsic mapping the language from the code. The mapping comes\
            \ from the spec, however, the code may not always reflect with the actual\
            \ language used in the localized claims.\nUse this as a reference.\nPossible\
            \ values:\n- Assamese (01)\n- Bengali (02)\n- Gujarati (05)\n- Hindi (06)\n\
            - Kannada (07)\n- Malayalam (11)\n- Manipuri (12)\n- Marathi (13)\n- Oriya\
            \ (15)\n- Punjabi (16)\n- Tamil (20)\n- Telugu (21)\n- Urdu (22)"
          example: Gujarati
          readOnly: true
          type: string
      required:
      - languageName
      type: object
    AadhaarLocalizedClaims:
      properties:
        language:
          allOf:
          - $ref: "#/components/schemas/AadhaarLanguage"
          description: The language code for the localized claims.
          nullable: true
        name:
          description: The full name.
          example: રાજેશ કુમાર
          nullable: true
          type: string
        address:
          allOf:
          - $ref: "#/components/schemas/AadhaarAddress"
          description: The structured address.
          example:
            careOf: "પિતા: પ્રિયા કુમારી"
            country: ભારત
            district: અમદાવાદ
            house: "12"
            location: નવરંગપુરા
            landmark: સિટી મોલ પાસે
            postalCode: "226010"
            postOffice: નવરંગપુરા
            state: ગુજરાત
            street: મહાત્મા ગાંધી રોડ
            subdistrict: વેજલપુર
            villageTownCity: અમદાવાદ
          nullable: true
      type: object
    AddRedirectUriRequest:
      example:
        uri: uri
      properties:
        uri:
          minLength: 1
          type: string
      required:
      - uri
      type: object
    AddRedirectUriResponse:
      example:
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
      properties:
        id:
          format: uuid
          type: string
      required:
      - id
      type: object
    Address:
      description: Address information for an individual
      properties:
        line1:
          nullable: true
          type: string
        line2:
          nullable: true
          type: string
        line3:
          nullable: true
          type: string
        city:
          nullable: true
          type: string
        subdivision:
          description: "The subdivision code of the address.\n            \nSubdivision\
            \ refers to a state, province, or other similar division of a country.\n\
            Examples include \"CA\" for California, \"QC\" for Québec, \"MD\" for\
            \ Madrid, or \"NSW\" for New South Wales."
          nullable: true
          type: string
        postalCode:
          nullable: true
          type: string
        country:
          nullable: true
          type: string
        fullAddress:
          description: The full address as a single string
          nullable: true
          type: string
      type: object
    AppleWalletInput:
      properties:
        exchangeMechanism:
          allOf:
          - $ref: "#/components/schemas/MdlExchangeMechanism"
          description: "The exchange mechanism to use for this Apple Wallet verification.\n\
            \            \nUse `DigitalCredentialsApi` for Digital Credentials API\
            \ on web, or `NativeApp` for a native iOS app."
          nullable: true
        preview_raw18013Request:
          allOf:
          - $ref: "#/components/schemas/Raw18013RequestInput"
          description: "**Preview feature: not suitable for production use cases**\n\
            \            \nThe raw 18013-7 exchange request to use for this verification.\n\
            \            \nIf set, this overrides any default configuration on your\
            \ Verification Profile.\n            \nNOTE: For Apple Wallet, this cannot\
            \ (yet) be used with the `NativeApp` (in-app) exchange mechanism. Only\
            \ the `DigitalCredentialsApi` (web) exchange mechanism supports this input."
          nullable: true
      type: object
    AppleWalletProviderOutput:
      description: Exposed properties for the `apple-wallet` Provider which do not
        directly map to the normalized IdentityData model.
      properties:
        rawMdlOutput:
          allOf:
          - $ref: "#/components/schemas/MdlOutput"
          description: The raw output of the mDL exchange performed through Apple
            Wallet.
      required:
      - rawMdlOutput
      type: object
    AttachmentInfo:
      properties:
        id:
          description: "The unique identifier of the Attachment.\n            \nPass\
            \ this to the `GetAttachment` endpoint, along with the Session ID and\
            \ the `resultsAccessKey` for said Session."
          format: uuid
          type: string
        type:
          description: "The type of the Attachment.\n            \nPossible values:\n\
            - \"selfie\"\n- \"document_front\"\n- \"document_back\"\n- \"document_portrait\"\
            \n- \"document_signature\"\n- \"document_scan_report\"\n            \n\
            Additional attachment types may be defined for specific Providers."
          type: string
        contentType:
          description: "The MIME type of the attachment's contents; eg, \"image/jpeg\"\
            \ or \"application/pdf\"."
          type: string
        sizeBytes:
          description: The size in bytes of the attachment.
          format: int32
          type: integer
      required:
      - contentType
      - id
      - sizeBytes
      - type
      type: object
    AttributeAvailability:
      description: Indicates when an attribute will be available in verification results.
      enum:
      - Never
      - Sometimes
      - Always
      type: string
      x-enumDescriptions:
        Never: This attribute will never be present in verification results.
        Sometimes: This attribute may or may not be present depending on the verification
          context.
        Always: This attribute will always be present in verification results.
    AudkenniProviderOutput:
      description: Exposed properties for the `audkenni` Provider which do not directly
        map to the normalized IdentityData model.
      properties:
        nationalRegisterId:
          description: "National Register ID number (kennitala) of the individual.\n\
            \            \nOften written with a hyphen following the 6th digit (123456-1234).\n\
            ID numbers are composed of ten digits. The first six of these are the\
            \ individual’s date of birth in the format DDMMYY.\nThe seventh and eighth\
            \ digits are randomly chosen when the ID number is allocated, the ninth\
            \ digit used to be a check digit (modulus (11) but this has been removed.\n\
            The tenth indicates the century of the individual’s birth: ‘9’ for 1900–\
            1999, ‘0’ for 2000 and beyond."
          example: "0101303369"
          type: string
        subjectId:
          description: "Unique identifier for the individual across Audkenni.\n  \
            \          \nIt is recommended to use this identifier instead of using\
            \ the national register ID directly."
          example: 2963785c-b8cc-490e-8d7e-054f7538383b
          type: string
        name:
          description: The full name of the individual.
          example: Gervimaður Asía
          type: string
        dateOfBirth:
          description: |-
            The date of birth of the individual as parsed from the National Register ID number.
            Is null if the date of birth could not be parsed, but should always be present
          example: 1980-01-31
          format: date
          nullable: true
          type: string
      required:
      - name
      - nationalRegisterId
      - subjectId
      type: object
    AustriaHandySignaturProviderOutput:
      description: Exposed properties for the `a-at-handy-signatur-login` Provider
        which do not directly map to the normalized IdentityData model.
      properties:
        firstName:
          description: The first name of the verified individual
          example: John
          type: string
        lastName:
          description: The last name of the verified individual
          example: Doe
          type: string
      required:
      - firstName
      - lastName
      type: object
    BelgiumIdCardProviderOutput:
      description: Exposed properties for the `a-be-id-login` Provider which do not
        directly map to the normalized IdentityData model.
      properties:
        firstName:
          description: The first name of the verified individual
          example: John
          type: string
        lastName:
          description: The last name of the verified individual
          example: Doe
          type: string
        dateOfBirth:
          description: The date of birth of the verified individual
          example: 1985-12-10
          format: date
          type: string
        nationalRegisterNumber:
          description: "The Belgian National Register Number (\"Rijksregisternummer\"\
            ) of the verified individual.\n            \nThis is an 11-digit number\
            \ in the format YYMMDDXXXCC, where:\n- YYMMDD represents the individual's\
            \ date of birth (year, month, day).\n- XXX is a sequential birth number,\
            \ odd for males and even for females.\n- CC is a checksum, calculated\
            \ with the equation: 97 - (YYMMDDXXX mod 97)\n            \nFor births\
            \ in the year 2000 or later, the digit '2' is prepended to the first 9\
            \ digits during checksum calculation."
          example: "83122412413"
          type: string
      required:
      - dateOfBirth
      - firstName
      - lastName
      - nationalRegisterNumber
      type: object
    BoliviaCiLookupInput:
      properties:
        documentNumber:
          description: "The holder's CI (\"Cédula de Identidad\") number from the\
            \ Bolivian identity card (\"carnet de identidad\").\nThis is the identifier\
            \ assigned by the Servicio General de Identificación Personal (SEGIP)\
            \ in the\nRegistro Único de Identificación (RUI). Is entirely numeric\
            \ values. Any non-alphanumeric characters\n(dots, hyphens, spaces, etc.)\
            \ will be stripped before lookup.\n            \nPublished regulations\
            \ do not define a fixed length; digit count may vary."
          example: "123456789"
          nullable: true
          type: string
        dateOfBirth:
          description: The holder's date of birth. Must match the CI record.
          example: 1990-03-15
          format: date
          nullable: true
          type: string
      type: object
    BoliviaCiProviderOutput:
      description: Exposed properties for the `bolivia-ci-lookup` Provider which do
        not directly map to the normalized IdentityData model.
      properties:
        fullName:
          description: Full name as it appears on the CI (Cédula de Identidad).
          example: María Mamani
          type: string
        givenName:
          description: Given name(s) of the holder as they appear on the CI (Cédula
            de Identidad).
          example: María
          type: string
        familyName:
          description: Family name(s) of the holder (paternal and maternal) as they
            appear on the CI (Cédula de Identidad).
          example: Mamani
          type: string
        dateOfBirth:
          description: Date of birth as recorded in official Bolivian identity records
            (RUI — Registro Único de Identificación).
          example: 1990-03-15
          format: date
          nullable: true
          type: string
        documentNumber:
          description: "The CI (Cédula de Identidad) document number for the matched\
            \ record.\n            \nThe document is officially called the Cédula\
            \ de Identidad and is commonly called carnet or carnet de\nidentidad in\
            \ Bolivia. This is the identifier assigned by the Servicio General de\
            \ Identificación Personal\n(SEGIP) in the Registro Único de Identificació\
            n (RUI). The value is entirely numeric. There is no\nverification digit\
            \ or other data encoded in the number.\n            \nPublished regulations\
            \ do not define a fixed length; digit count may vary."
          example: "123456789"
          type: string
      required:
      - documentNumber
      - familyName
      - fullName
      - givenName
      type: object
    BrazilCpfCheckInput:
      properties:
        cpfNumber:
          description: "The user's 11-digit, numeric CPF Number"
          maxLength: 11
          minLength: 11
          pattern: ^\d*$
          type: string
        selfieImage:
          description: The raw bytes of the selfie image collected from the user.
          format: byte
          nullable: true
          type: string
        selfieImageContentType:
          description: "The MIME Type of the file contained in `SelfieImage`.\n  \
            \          \nMust be one of `image/jpeg` or `image/png`."
          nullable: true
          type: string
      required:
      - cpfNumber
      type: object
    BrazilDigitalCnhInput:
      properties:
        cpfNumber:
          description: "The user's 11-digit, numeric CPF Number"
          maxLength: 11
          minLength: 11
          pattern: ^\d*$
          type: string
        digitalCnhFile:
          description: The raw bytes of the digital CNH file collected from the user.
          format: byte
          nullable: true
          type: string
        digitalCnhFileContentType:
          description: "The MIME Type of the file contained in `DigitalCnhFile`.\n\
            \            \nMust be one of `application/pdf`, `image/jpeg`, or `image/png`."
          nullable: true
          type: string
        facialBiometryPhoto:
          description: "The raw bytes of the image of the user's face, collected for\
            \ biometric comparison."
          format: byte
          nullable: true
          type: string
      required:
      - cpfNumber
      type: object
    CancelSessionResponse:
      example:
        session: ""
      properties:
        session:
          allOf:
          - $ref: "#/components/schemas/Session"
      required:
      - session
      type: object
    ChinaResidentIdMatchInput:
      properties:
        fullName:
          description: The person's full name in Chinese characters.
          minLength: 1
          type: string
        dateOfBirth:
          description: "The person's date of birth, in `YYYY-MM-DD` format."
          format: date
          type: string
        nationalIdNumber:
          description: The person's 18-character PRC resident identity card number.
          maxLength: 18
          minLength: 18
          pattern: "^\\d{17}[\\dXx]$"
          type: string
        consent:
          description: Consent from the end user for verification of their data.
          type: boolean
      required:
      - consent
      - dateOfBirth
      - fullName
      - nationalIdNumber
      type: object
    ChinaResidentIdMatchOutput:
      description: Exposed properties for the `china-resident-id-match` Provider which
        do not directly map to the normalized IdentityData model.
      properties:
        fullName:
          description: The fullname of the individual in Chinese.
          example: 陈明志
          nullable: true
          type: string
        dateOfBirth:
          description: The birthdate of the individual.
          example: 1980-01-31
          format: date
          nullable: true
          type: string
        residentIdNumber:
          description: "The Resident ID number from the People's Republic of China\
            \ (PRC) ID card.\n            \nThe Resident ID number is an 18-digit\
            \ number follows the format (AAAAAAYYYYMMDDXXX@):\n- Six digits (AAAAAA)\
            \ are the area code of where the person was born or the area of first\
            \ issuance for those who were born before the resident system was created.\n\
            - Eight digits are the birthdate of the individual in YYYYMMDD format\n\
            - Three digits are the order code assigned to individual. Males are assigned\
            \ odd numbers and females even numbers.\n- Final digit is the checksum\
            \ confirming the validity of the ID number's first 17 digits using ISO\
            \ 7064:1983, MOD 11-2."
          example: "110102198001318811"
          nullable: true
          type: string
      type: object
    ColombiaCcLookupInput:
      properties:
        documentNumber:
          description: "The CC (Cédula de Ciudadanía, Citizenship Document) document\
            \ number.\n            \nFormat:\n- Cédulas after 2004 use the NUIP (Nú\
            mero Único de Identificación Personal), which is 10 digits.\n  Older documents\
            \ may have fewer than 10 digits and are still valid.\n- In Colombia the\
            \ number is often written with dots as thousands separators (e.g. 1.234.567.890).\
            \ If dots,\n  hyphens, spaces, or other non-alphanumeric characters are\
            \ included, they will be sanitized before lookup."
          example: "1234567890"
          nullable: true
          type: string
        issueDate:
          description: "Document issue date, in `YYYY-MM-DD` format"
          example: 2025-10-31
          format: date
          nullable: true
          type: string
      type: object
    ColombiaCcProviderOutput:
      description: Exposed properties for the `colombia-cc-lookup` Provider which
        do not directly map to the normalized IdentityData model.
      properties:
        fullName:
          description: Full name as it appears on the CC.
          example: JUAN CARLOS PEREZ GOMEZ
          type: string
        givenName:
          description: Given name(s) of the holder as they appear on the CC.
          example: JUAN CARLOS
          type: string
        familyName:
          description: |-
            Family name(s) of the holder as they appear on the CC. Space-separated when
            both paternal and maternal family names are present.
          example: PEREZ GOMEZ
          type: string
        dateOfBirth:
          description: Date of birth as recorded in the civil registry (Registraduría
            Nacional).
          example: 1985-01-15
          format: date
          type: string
        sex:
          description: "Sex of the holder as recorded in the civil registry (Registradurí\
            a Nacional).\n            \nPossible values:\n- Male\n- Female\n- Unknown\
            \ (when the sex is not recorded or cannot be confidently determined)"
          example: Male
          type: string
        isAlive:
          description: "Whether the person is reported as alive in Colombia's official\
            \ civil registry (Registraduría Nacional).\n            \nUsed to detect\
            \ identity fraud when the holder is deceased."
          example: true
          type: boolean
        documentNumber:
          description: "The Cédula de Ciudadanía (CC) document number.\n         \
            \   \nThis is the unique identifier assigned by the Registraduría Nacional\
            \ when the person is first\nissued a CC. It does not change when the person\
            \ renews or receives a new physical card; it\nremains the same for the\
            \ individual for life.\n            \nCédulas issued after 2004 use the\
            \ NUIP (Número Único de Identificación Personal), which is\n10 digits.\
            \ Older documents may have fewer than 10 digits and are still valid."
          example: "1234567890"
          type: string
        expeditionDate:
          description: "Date the CC was issued (fecha de expedición).\n          \
            \  \nFormat:\n- yyyy-MM-dd"
          example: 2020-03-10
          format: date
          type: string
        expeditionPlace:
          allOf:
          - $ref: "#/components/schemas/ColombiaExpeditionPlace"
          description: |-
            Place where the CC was issued (lugar de expedición): municipality and department as recorded
            by the Registraduría Nacional.
          example:
            municipality: BOGOTA D.C.
            department: BOGOTA
        arrayName:
          description: "All names as they appear on the CC, as an array of strings.\n\
            \            \nFormat:\n- Order follows the civil registry: typically\
            \ family name(s) first, then given name(s)."
          example:
          - PEREZ
          - GOMEZ
          - JUAN
          - CARLOS
          items:
            type: string
          type: array
      required:
      - arrayName
      - dateOfBirth
      - documentNumber
      - expeditionDate
      - expeditionPlace
      - familyName
      - fullName
      - givenName
      - isAlive
      - sex
      type: object
    ColombiaExpeditionPlace:
      description: "Place of expedition (issue) for the Colombia Cédula de Ciudadaní\
        a (CC) as recorded by the Registraduría\nNacional del Estado Civil (National\
        \ Civil Registry).\n            \nColombia uses a two-level administrative\
        \ hierarchy for place of issue: municipality (municipio) within\ndepartment\
        \ (departamento)."
      properties:
        municipality:
          description: "Municipality (municipio) where the CC was issued.\n      \
            \      \nThis is the second-level administrative division in Colombia."
          example: BOGOTA D.C.
          nullable: true
          type: string
        department:
          description: "Department (departamento) where the CC was issued.\n     \
            \       \nThis is the first-level administrative division in Colombia."
          example: BOGOTA
          nullable: true
          type: string
      type: object
    ConnectIdAddress:
      properties:
        streetAddress:
          description: The address' line or street.
          example: L 7 SE 3 17 Jones St
          nullable: true
          type: string
        locality:
          description: The address' locality or city.
          example: North Sydney
          nullable: true
          type: string
        region:
          description: "The address' region, state, or territory."
          example: NSW
          nullable: true
          type: string
        country:
          description: "The address' country.\n            \nThis value is not normalized\
            \ and may be an alpha-3 code or full country name."
          example: AUS
          nullable: true
          type: string
        postalCode:
          description: The address' postal code.
          example: "2060"
          nullable: true
          type: string
      type: object
    ConnectIdAgeVerification:
      properties:
        over18:
          description: If the individual is over 18 years old.
          example: true
          nullable: true
          type: boolean
        trustFramework:
          description: The authority that verified the claim.
          example: au_connectid
          nullable: true
          type: string
      type: object
    ConnectIdProviderOutput:
      description: Exposed properties for the `australia-connect-id` Provider which
        do not directly map to the normalized IdentityData model.
      properties:
        birthdate:
          description: The date of birth of an individual in YYYY-MM-DD format.
          example: 1985-01-31
          format: date
          nullable: true
          type: string
        givenName:
          description: The given name of an individual.
          example: John
          nullable: true
          type: string
        middleName:
          description: The middle name of an individual.
          example: Albert
          nullable: true
          type: string
        familyName:
          description: The family/last name of an individual.
          example: Smith
          nullable: true
          type: string
        phoneNumber:
          description: The phone number of an individual.
          example: "+61271111222"
          nullable: true
          type: string
        email:
          description: The email of an individual.
          example: johnasmith@example.com
          nullable: true
          type: string
        sub:
          description: The OpenID Connect (OIDC) subject identifier (sub).
          example: abcdefg123456
          nullable: true
          type: string
        ageVerification:
          allOf:
          - $ref: "#/components/schemas/ConnectIdAgeVerification"
