    YotiDeeplinkProviderOutput:
      description: Exposed properties for the `yoti-deeplink` Provider which do not
        directly map to the normalized IdentityData model.
      properties:
        rememberMeId:
          description: "A Yoti-generated unique ID for this individual, consistent\
            \ across repeat shares and different for each Relying Party."
          example: 9f63ff98-e1e3-433c-9b86-7c697d0b4e5f
          format: uuid
          nullable: true
          type: string
        email:
          description: The email address of the individual
          example: johndoe@example.com
          nullable: true
          type: string
        givenName:
          description: The given name of the individual. This can correspond to first
            and middle names in English.
          example: John Alvin
          nullable: true
          type: string
        familyName:
          description: The family name of the individual
          example: Doe
          nullable: true
          type: string
        fullName:
          description: |-
            Full name of the individual which is composed of the given and family name.
            Unverified full name may be safe to use. For example, Aadhaar card provides full name, but due to certain limitations of verifying Aadhaar, Yoti is unable to verify this property so it is listed as "unverified".
          example: John Alvin Doe
          nullable: true
          type: string
        dateOfBirth:
          description: |-
            The date of birth of the individual.
            Unverified date of birth may be safe to use. For example, Aadhaar card provides date of birth, but due to certain limitations of verifying Aadhaar, Yoti is unable to verify this property so it is listed as "unverified".
          example: 1985-01-31
          format: date
          nullable: true
          type: string
        gender:
          description: "The gender of the individual. Depending on the source or country,\
            \ gender may not be verified. This is a setting that can be configured\
            \ while setting up scopes.\n            \nUnverified gender may be safe\
            \ to use. For example, Aadhaar card provides gender, but due to certain\
            \ limitations of verifying Aadhaar, Yoti is unable to verify this property\
            \ so it is listed as \"unverified\".\nIn some countries\nPossible values:\n\
            - \"MALE\"\n- \"FEMALE\"\n- \"TRANSGENDER\"\n- \"OTHER\""
          example: MALE
          nullable: true
          type: string
        nationality:
          description: The nationality of the individual as a ISO alpha-3 code
          example: GBR
          nullable: true
          type: string
        mobileNumber:
          description: "The mobile phone number of the individual. This number was\
            \ verified with a one time password (OTP) during the individual's registration\
            \ with Yoti. In some cases, Yoti may do additional checks against its\
            \ sources to confirm the individual's identity."
          example: "+447777123456"
          nullable: true
          type: string
        structuredPostalAddress:
          allOf:
          - $ref: "#/components/schemas/YotiStructuredPostalAddress"
          description: |-
            A structured postal address for the individual that comes from the underlying document or can be manually added. In the case of being manually added, the address is considered "unverified".
            Unverified addresses may be safe to use. For example, Aadhaar card provides an address, but due to certain limitations of verifying Aadhaar, Yoti is unable to verify this property so it is listed as "unverified".
          nullable: true
        postalAddress:
          description: |-
            The whole address for the individual that comes from the underlying document or can be manually added. In the case of being manually added, the address is considered "unverified". The format of this will be different for each country.
            Refer to `StructuredPostalAddress` for a detailed version of the address.
          example: "6th Floor, 107 Leadenhall St, London, EC3A 4AF"
          nullable: true
          type: string
        documentDetails:
          allOf:
          - $ref: "#/components/schemas/YotiDocumentDetails"
          description: The details of the underlying document used to help create
            the Yoti credential
          nullable: true
      type: object
    YotiDocumentDetails:
      properties:
        type:
          description: "The type of document used to create the Yoti credential.\n\
            \            \nPossible values:\n- PASSPORT: A government-issued identity\
            \ document\n- DRIVING_LICENCE: A government-issued identity card\n- NATIONAL_ID:\
            \ A government-issued identity card\n- PASS_CARD: A physical or digital\
            \ identity card that is accredited by the UK's national Proof of Age Standards\
            \ Scheme (PASS)"
          example: PASSPORT
          nullable: true
          type: string
        issuingCountry:
          description: The issuing country's ISO alpha-3 code
          example: GBR
          nullable: true
          type: string
        documentNumber:
          description: The arbitrary document number for the provided document type
          example: "123456789"
          nullable: true
          type: string
        expirationDate:
          description: The document's expiration date in YYYY-MM-DD format
          example: 2016-03-21
          format: date
          nullable: true
          type: string
        issuingAuthority:
          description: The document's issuing authority. This can either be a country
            code as a specified ISO alpha-3 or the name of the issuing authority.
          example: GBR
          nullable: true
          type: string
      type: object
