            \            \nThis is in the format DDMMYYYRRSSSC, where:\n- DDMM is\
            \ the day and month of birth\n- YYY is the last three digits of the year\
            \ of birth\n- RR is the political region code of the region of birth (if\
            \ born after 1976) or of first registration (if born before 1976)\n- SSS\
            \ is a unique sex-specific serial number for individuals born on the same\
            \ date in the same region\n- C is a checksum digit\n            \nIf YYY\
            \ is between 000 and 099, the millennium digit of the year is \"2\"; the\
            \ individual was born after the year 2000.\nIf YYY is between 800 and\
            \ 999, the millennium digit of the year is \"1\"; the individual was born\
            \ before the year 2000.\n            \nIf SSS is between 000 and 499,\
            \ the individual is male.\nIf SSS is between 500 and 999, the individual\
            \ is female."
          example: "3006990711231"
