          description: |-
            Nationality information with ISO 3166 alpha-3 code and French label.
            The label is provided in French (e.g., "Française" for French nationality).
          example:
            code: FRA
            label: Française
          nullable: true
        sex:
          description: Sex - "Male" or "Female".
          example: Male
          nullable: true
          type: string
        majority:
          description: |-
            Majority status (majorité) indicating whether the individual has reached the
            French age of legal majority (18 years old). This value is computed by
            the provider from the individual's birthdate.
          example: true
          nullable: true
          type: boolean
        phoneNumber:
          allOf:
          - $ref: "#/components/schemas/FrenchNumeriquePhone"
          description: |-
            Phone number information including the full phone number and its structured components
            (country prefix and national number).
          nullable: true
        phoneNumberVerified:
          description: Whether the phone number has been verified by the provider.
          example: true
          nullable: true
          type: boolean
        email:
          description: Email address registered in the individual's digital identity
            account.
          example: jean.dupont@example.fr
          nullable: true
          type: string
        emailVerified:
          description: Whether the email address has been verified by the provider.
          example: true
          nullable: true
          type: boolean
        birthplace:
          description: "National Institute of Statistics and Economic Studies (INSEE)\
            \ official geographic code (COG)\nof the birthplace. This is a 5-digit\
            \ French administrative code identifying the commune\n(municipality) of\
            \ birth. For births in metropolitan France, the first two digits represent\n\
            the department.\n            \nSee: https://www.insee.fr/fr/information/2560452"
          example: "75056"
          nullable: true
          type: string
        birthplaceLabel:
          description: |-
            Name of the birthplace commune (municipality). If applicable, this includes the full name of
            the arrondissement (borough).
          example: PARIS-9E-ARRONDISSEMENT
          nullable: true
          type: string
        birthCountry:
          description: "National Institute of Statistics and Economic Studies (INSEE)\
            \ official geographic code (COG)\nfor the individual's country of birth.\n\
            \            \nLaPoste returns this as a 5-character numeric string. This\
            \ is a country/territory COG,\nso it always starts with \"99\" (99xxx).\
            \ France is coded as 99100.\n            \nSee full list here: https://www.insee.fr/fr/information/2560452"
          example: "99100"
          nullable: true
          type: string
        birthCountryIso:
          description: Birth country as an ISO 3166 alpha-3 code.
          example: FRA
          nullable: true
          type: string
        birthCountryLabel:
          description: "Label of the birth country, in English."
          example: France
          nullable: true
          type: string
        birthDepartment:
          description: "Number of the department of birth (e.g., \"75\" for Paris,\
            \ \"2A\" for Corse-du-Sud).\n            \nSee full list here: https://en.wikipedia.org/wiki/Departments_of_France"
          example: "75"
          nullable: true
          type: string
        digitalIdentityCreationDate:
          description: Date when the individual's digital identity was created.
          example: 2023-06-15
          format: date
          nullable: true
          type: string
        digitalIdentityExpirationDate:
          description: |-
            Date when the digital identity expires. It is valid for 5 years from the date of identity verification.
            Individuals are notified ~1 month before and must re-verify identity via the app or in-person at La Poste.
            After expiration, the identity is deactivated but can be renewed within 1 year; otherwise deleted.
          example: 2028-06-15
          format: date
          nullable: true
          type: string
        identityDocumentType:
          description: |-
            Type of identity document used for verification.
            Can be "ID_CARD", "PASSPORT", or "RESIDENCE_PERMIT".
          example: PASSPORT
          nullable: true
          type: string
        identityDocumentNumber:
          description: "Identity document number as it appears on the ID Card, Passport\
            \ or Residence Permit."
          example: 51RF501150
          nullable: true
          type: string
        identityDocumentEmittingDate:
          description: Date when the identity document was issued.
          example: 2021-03-24
          format: date
          nullable: true
          type: string
        identityDocumentExpirationDate:
          description: Date when the identity document expires.
          example: 2031-03-24
          format: date
          nullable: true
          type: string
        identityDocumentEmittingCountry:
          description: Country that issued the identity document (ISO 3166 alpha-3
            code).
          example: FRA
          nullable: true
          type: string
        identityDocumentMrz:
          description: "Machine Readable Zone (MRZ) data from the ID Card, Passport\
            \ or Residence Permit."
          example: P<FRASPECIMEN<<NATACHA<<<<<<<<<<<<<<<<<<<<<<<<<51RF501150FRA7307122F2203242<<<<<<<<<<<<<<<02
          nullable: true
          type: string
      type: object
