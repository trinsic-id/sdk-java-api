    ElSalvadorDuiLookupInput:
      properties:
        documentNumber:
          description: "The DUI (Documento Único de Identidad) number for the holder.\n\
            \            \nNine numeric digits after sanitization. Commonly printed\
            \ as ########-# (hyphen before the final digit).\nThe input will automatically\
            \ be sanitized of dots, hyphens, spaces, or other non-alphanumeric characters\n\
            before lookup.\n            \nThe ninth digit is a check digit. This is\
            \ not publicly documented by the Salvadoran government, but the\nalgorithm\
            \ is available in the public domain for those who seek it."
          example: "123456789"
          nullable: true
          type: string
        dateOfBirth:
          description: The DUI holder's date of birth. Required to match the correct
            person in official records.
          example: 1995-12-01
          format: date
          nullable: true
          type: string
      type: object
    ElSalvadorDuiProviderOutput:
      description: Exposed properties for the `el-salvador-dui-lookup` Provider which
        do not directly map to the normalized IdentityData model.
      properties:
        fullName:
          description: |-
            Full name as it appears on the DUI (Documento Único de Identidad), as returned by Verifik from
            official records administered by the Registro Nacional de las Personas Naturales (RNPN).
          example: Juan Pérez
          type: string
        documentNumber:
          description: "The DUI (Documento Único de Identidad) document number as\
            \ returned by Verifik for the matched record.\n            \nNine numeric\
            \ digits after sanitization. Commonly printed as ########-# (hyphen before\
            \ the final digit).\nThe output will be stripped of the hyphen and will\
            \ preserve leading zeros.\n            \nThe ninth digit is a check digit.\
            \ This is not publicly documented by the Salvadoran government, but the\n\
            algorithm is available in the public domain for those who seek it."
          example: "123456789"
          type: string
        dateOfBirth:
          description: The date of birth that was supplied for the lookup and confirmed
            as matching the DUI record.
          example: 1995-12-01
          format: date
          type: string
      required:
      - dateOfBirth
      - documentNumber
      - fullName
      type: object
    EstoniaIdCardProviderOutput:
      description: Exposed properties for the `a-ee-web-eid-login` Provider which
        do not directly map to the normalized IdentityData model.
      properties:
        firstName:
          description: The first name of the verified individual
          example: John
          type: string
        lastName:
          description: The last name of the verified individual
          example: Doe
          type: string
        dateOfBirth:
          description: The date of birth of the verified individual
          example: 1985-12-10
          format: date
          type: string
        personalIdentificationCode:
          description: "The 11-digit Estonian personal identification code (\"isikukood\"\
            ) of the verified individual.\n            \nThis is in the format GYYMMDDSSSC,\
            \ where:\n- G combines the century and sex of birth\n- YYMMDD is the date\
            \ of birth within the given century\n- SSS is a serial number distinguishing\
            \ people born on the same date\n- C is a checksum digit\n            \n\
            If G is odd, the individual is male.\nIf G is even, the individual is\
            \ female.\n            \nIf G is 1 or 2, the individual was born in the\
            \ 19th century (1800-1899).\nIf G is 3 or 4, the individual was born in\
            \ the 20th century (1900-1999).\nIf G is 5 or 6, the individual was born\
            \ in the 21st century (2000-2099).\nIf G is 7 or 8, the individual was\
            \ born in the 22nd century (2100-2199)."
          example: "39006301234"
          type: string
      required:
      - dateOfBirth
      - firstName
      - lastName
      - personalIdentificationCode
      type: object
    FaydaProviderAddress:
      properties:
        region:
          description: "The region, which is the primary administrative division of\
            \ the address.\n            \nThis attribute is only available if registered\
            \ directly."
          example: Addis Ababa
          nullable: true
          type: string
        zone:
          description: "The zone, which is the administrative area within the region.\n\
            \            \nThis attribute is only available if registered directly."
          example: Bole
          nullable: true
          type: string
        woreda:
          description: "The woreda, which is the local district within the zone.\n\
            \            \nThis attribute is only available if registered directly."
          example: "03"
          nullable: true
          type: string
      type: object
    FaydaProviderOutput:
      description: Exposed properties for the `ethiopia-fayda` Provider which do not
        directly map to the normalized IdentityData model.
      properties:
        sub:
          description: "A unique eKYC identifying token used to match the original\
            \ eKYC token received from the provider when the individual was initially\
            \ registered.\n            \nSince Fayda does not return identifying data,\
            \ it is the responsibility of the relying party to keep the unique individual\
            \ token received from Fayda when\nthe individual was initially registered\
            \ to do a comparison of the subs to verify that it is the same person."
          example: F50278D6-7C38-4284-83CD-549BBC818F5C
          nullable: true
          type: string
        name:
          description: "The full name of the verified individual.\n            \n\
            This may be an English or Arabic name if the individual only has it one\
            \ language, otherwise this will be null and the other names will be populated."
          example: Yohannes Tesfaye
          nullable: true
          type: string
        englishName:
          description: The full English name of the verified individual.
          example: Yohannes Tesfaye
          nullable: true
          type: string
        arabicName:
          description: The full Arabic name of the verified individual.
          example: يوهانس تيسفاي
          nullable: true
          type: string
        birthdate:
          description: "The date of birth of the verified individual.\n          \
            \  \nThis attribute is only available if registered directly."
          example: 1985-01-31
          format: date
          nullable: true
          type: string
        gender:
          description: "The sex of the verified individual.\n            \nPossible\
            \ values:\n- Unknown\n- NotApplicable\n- Male\n- Female\n            \n\
            This attribute is only available if registered directly."
          example: Male
          nullable: true
          type: string
        nationality:
          description: "The nationality of the verified individual as an ISO 3166-1\
            \ alpha-2 country code.\n            \nThis attribute is only available\
            \ if registered directly."
          example: ET
          nullable: true
          type: string
        phoneNumber:
          description: "The phone number of the verified individual.\n           \
            \ \nThis attribute is only available if registered directly."
          example: "+251911234567"
          nullable: true
          type: string
        email:
          description: "The email address of the verified individual.\n          \
            \  \nThis attribute is only available if registered directly."
          example: yohannes@example.com
          nullable: true
          type: string
        address:
          allOf:
          - $ref: "#/components/schemas/FaydaProviderAddress"
          description: "The address of the verified individual.\n            \nThis\
            \ attribute is only available if registered directly."
          nullable: true
      type: object
    FinlandIdCardProviderOutput:
      description: Exposed properties for the `a-fi-id-login` Provider which do not
        directly map to the normalized IdentityData model.
      properties:
        firstName:
          description: The first name of the verified individual
          example: John
          type: string
        lastName:
          description: The last name of the verified individual
          example: Doe
          type: string
        dateOfBirth:
          description: The date of birth of the verified individual
          example: 1985-12-10
          format: date
          type: string
        personalIdentificationCode:
          description: "The 11-digit Finnish Personal Identification Code (Henkilö\
            tunnus) of the verified individual.\n            \n This is in the format\
            \ DDMMYYCZZZQ, where:\n- DDMMYY is the date of birth\n- C is a symbol\
            \ which determines the century of birth\n- ZZZ is an individual number,\
            \ indicating gender\n- Q is a checksum character\n            \nIf ZZZ\
            \ is even, the individual is female.\nIf ZZZ is odd, the individual is\
            \ male.\n            \nIf C is '+', the individual was born in the 19th\
            \ century (1800-1899).\nIf C is '-', 'U', 'V', 'W', 'X', or 'Y', the individual\
            \ was born in the 20th century (1900-1999).\nIf C is 'A', 'B', 'C', 'D',\
            \ 'E', or 'F', the individual was born in the 21st century (2000-2099)."
          example: 300690-543X
          type: string
      required:
      - dateOfBirth
      - firstName
      - lastName
      - personalIdentificationCode
      type: object
    FinnishTrustNetworkProviderOutput:
      description: Exposed properties for the `finnish-trust-network` Provider which
        do not directly map to the normalized IdentityData model.
      properties:
        fullName:
          description: The full name of the individual.
          example: Ove Henriksen
          nullable: true
          type: string
        dateOfBirth:
          description: The date of birth of the individual.
          example: 1943-08-15
          format: date
          nullable: true
          type: string
        personalIdentificationCode:
          description: "The 11-digit Finnish Personal Identification Code (Henkilö\
            tunnus) of the verified individual.\n            \nThis is in the format\
            \ DDMMYYCZZZQ, where:\n- DDMMYY is the date of birth\n- C is a symbol\
            \ which determines the century of birth\n- ZZZ is an individual number,\
            \ indicating gender\n- Q is a checksum character\n            \nIf ZZZ\
            \ is even, the individual is female.\nIf ZZZ is odd, the individual is\
            \ male.\n            \nIf C is '+', the individual was born in the 19th\
            \ century (1800-1899).\nIf C is '-', 'U', 'V', 'W', 'X', or 'Y', the individual\
            \ was born in the 20th century (1900-1999).\nIf C is 'A', 'B', 'C', 'D',\
            \ 'E', or 'F', the individual was born in the 21st century (2000-2099)."
          example: 300690-543X
          nullable: true
          type: string
        uniqueIdentificationNumber:
          description: "The 9-digit Finnish Unique Identification Number (FINUID,\
            \ or sähköinen asiointitunnus SATU) of the verified individual.\nThis\
            \ number is typically used for online transactions and unlike the Finnish\
            \ Personal Identification Code, does not reveal personal information such\
            \ as birthdate.\n            \nThe first 8 digits are randomly generated\
            \ and the last character is a check control."
          example: 30069054X
          nullable: true
          type: string
        givenName:
          description: The given name of the individual.
          example: Ove
          nullable: true
          type: string
        familyName:
          description: The family name of the individual.
          example: Henriksen
          nullable: true
          type: string
        levelOfAssurance:
          description: "The level of assurance (LOA) for the verification.\n     \
            \       \nThe LOA refers to the degree of confidence in the claimed identity\
            \ of a person.\nThe European Digital Identity Framework (EUDI) measures\
            \ the confidence of the digital identity's verification and authentication\
            \ strength by a set of requirements for different levels.\nTo learn more,\
            \ see: https://ec.europa.eu/digital-building-blocks/sites/spaces/DIGITAL/pages/467110081/eIDAS+Levels+of+Assurance\n\
            \            \nPossible values:\n- Low: The individual has self asserted\
            \ their identity and multifactor authentication is not required.\n- Substantial:\
            \ The individual has performed either a remote or in-person identity verification\
            \ and multifactor authentication is required.\n- High: The individual\
            \ has performed an in-person identity proofing with an authorized representative\
            \ and has strong cryptographic authentication requirements such as using\
            \ a smart card."
          example: High
          nullable: true
          type: string
        bank:
          description: The bank used to perform the identification for the verified
            individual.
          example: opbank
          nullable: true
          type: string
        phoneNumber:
          description: "The phone number of the verified individual.\n           \
            \ \nThis is only returned if the individual authenticated with MobileID\
            \ (Mobiilivarmenne)."
          example: "+358401234567"
          nullable: true
          type: string
        organizationName:
          description: "The organization name that the individual is associated with.\n\
            \            \nThis is returned for requests that contain the organization\
            \ scope."
          example: Acme Company
          nullable: true
          type: string
        vatNumber:
          description: "The VAT number of the organization that the individual is\
            \ associated with.\n            \nThis is returned for requests that contain\
            \ the organization scope."
          example: FI07654321
          nullable: true
          type: string
      type: object
    FranceIdentiteInput:
