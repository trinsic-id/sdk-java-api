    IntegrationCapability:
      enum:
      - LaunchBrowser
      - DeeplinkToMobile
      - ShowContent
      - RefreshStepContent
      - CaptureRedirect
      - PollResult
      - PollAfterRedirect
      - NativeChallenge
      type: string
      x-enumDescriptions:
        LaunchBrowser: Signals that your integration supports the `LaunchBrowser`
          step type.
        DeeplinkToMobile: Signals that your integration supports the `DeeplinkToMobile`
          step type.
        ShowContent: Signals that your integration supports the `ShowContent` step
          type.
        RefreshStepContent: "Signals that your integration supports refreshable step\
          \ content, e.g., time-limited mobile deeplinks."
        CaptureRedirect: Signals that your integration supports the `CaptureRedirect`
          results collection method.
        PollResult: Signals that your integration supports the `PollResult` results
          collection method.
        PollAfterRedirect: "Signals that your integration supports polling after the\
          \ user has been redirected back to your application.\n            \nThis\
          \ is necessary for Providers which make results available asynchronously,\
          \ where the user is redirected back to your application before the results\
          \ are available."
        NativeChallenge: "Signals that your integration supports the `PerformNativeChallenge`\
          \ step type, paired with the `SubmitNativeChallengeResponse` collection\
          \ method.\n            \n`NativeChallenge` currently refers only to a native\
          \ mDL exchange API, such as Digital Credentials API on web\nor the Android\
          \ / iOS native app equivalents."
    IntegrationLaunchMethod:
      enum:
      - LaunchBrowser
      - None
      - DeeplinkToMobile
      - ShowContent
      - PerformNativeChallenge
      type: string
      x-enumDescriptions:
        LaunchBrowser: "The user's browser should be sent to the provided URL, either\
          \ in a new tab, pop-up, or top-level navigation."
        None: |-
          No action needs to be taken by the user; simply poll with the provided `resultsAccessKey`
          for the results of the session.
        DeeplinkToMobile: "The user must be sent to the provided URL, which is a mobile\
          \ deeplink.\n            \nThe URL should be shown as a button on mobile,\
          \ or as a QR code on desktop."
        ShowContent: Content must be displayed to the user to guide them through the
          process of verifying their identity.
        PerformNativeChallenge: "A challenge must be sent to a native API on the user's\
          \ device, such as the Digital Credentials API on web,\nor the equivalent\
          \ mDL exchange APIs on Android or iOS.\n            \nUse Trinsic's UI SDKs\
          \ on Web, Android, or iOS to streamline this process."
    IntegrationStep:
      description: A step to perform in the process of executing a Direct Provider
        Session
      properties:
        method:
          allOf:
          - $ref: "#/components/schemas/IntegrationLaunchMethod"
          description: The launch method to perform
          example: LaunchBrowser
          x-enumDescriptions:
            LaunchBrowser: "The user's browser should be sent to the provided URL,\
              \ either in a new tab, pop-up, or top-level navigation."
            None: |-
              No action needs to be taken by the user; simply poll with the provided `resultsAccessKey`
              for the results of the session.
            DeeplinkToMobile: "The user must be sent to the provided URL, which is\
              \ a mobile deeplink.\n            \nThe URL should be shown as a button\
              \ on mobile, or as a QR code on desktop."
            ShowContent: Content must be displayed to the user to guide them through
              the process of verifying their identity.
            PerformNativeChallenge: "A challenge must be sent to a native API on the\
              \ user's device, such as the Digital Credentials API on web,\nor the\
              \ equivalent mDL exchange APIs on Android or iOS.\n            \nUse\
              \ Trinsic's UI SDKs on Web, Android, or iOS to streamline this process."
        content:
          description: "Step type-specific content related to the step: a URL for\
            \ `LaunchBrowser`, a deeplink for `DeeplinkToMobile` or a string to show\
            \ to the user for `ShowContent`."
          example: https://verify.trinsic.id/api/session/launch?clientToken=...
          type: string
        refresh:
          allOf:
          - $ref: "#/components/schemas/StepRefreshInfo"
          description: "If non-null, contains metadata about how to refresh the value\
            \ of `content`."
          nullable: true
      required:
      - content
      - method
      type: object
    ItsmeProviderOutput:
      description: Exposed properties for the `a-itsme-login` Provider which do not
        directly map to the normalized IdentityData model.
      properties:
        firstName:
          description: The first name of the verified individual
          example: John
          type: string
        lastName:
          description: The last name of the verified individual
          example: Doe
          type: string
        dateOfBirth:
          description: The date of birth of the verified individual
          example: 1985-12-10
          format: date
          type: string
        hashedNationalRegisterNumber:
          description: "The hashed version of the Belgian National Register Number\
            \ of the verified individual.\n            \nBy default, itsme does not\
            \ return the raw National Register Number of the individual; instead,\
            \ only a hashed version is returned.\n            \nYour account must\
            \ be approved by itsme to receive the raw, unhashed National Register\
            \ Number."
          example: 5d17e158243dff0bd79fbfd06b27b80d04a40a6a0425e1bbb474c7634a2918f7
          nullable: true
          type: string
        nationalRegisterNumber:
          description: "The raw (not hashed) Belgian National Register Number (\"\
            Rijksregisternummer\") of the verified individual.\n            \nOnly\
            \ returned if your account has been explicitly authorized to receive it\
            \ by itsme; by law, this data is considered sensitive personal data.\n\
            \            \nThis is an 11-digit number in the format YYMMDDXXXCC, where:\n\
            - YYMMDD represents the individual's date of birth (year, month, day).\n\
            - XXX is a sequential birth number, odd for females and even for males.\n\
            - CC is a checksum, calculated with the equation: 97 - (YYMMDDXXX mod\
            \ 97)\n            \nFor births in the year 2000 or later, the digit '2'\
            \ is prepended to the first 9 digits during checksum calculation."
          example: "83122412413"
          nullable: true
          type: string
      required:
      - dateOfBirth
      - firstName
      - lastName
      type: object
    KenyaNidBiometric2Input:
      properties:
        idNumber:
          description: "The Kenya National ID Number (Nambari ya Kitambulisho) or\
            \ Unique Personal Identifier (Maisha Namba).\n            \nThis is the\
            \ primary unique identifier for Kenyan citizens in all government systems,\
            \ issued by\nthe National Registration Bureau (NRB). The format is either\
            \ 8 digits for National ID\nor 9 digits for Maisha Namba UPI (the new\
            \ format since 2023)."
          nullable: true
          type: string
        livenessImages:
          description: |-
            An array of exactly 8 images required for biometric liveness verification.
            The first 7 images should be liveness frames captured during the liveness detection process,
            and the last image (8th) should be a selfie of the user. All images must be in JPEG format
            and each image must be less than 15MB in size.
          items:
            format: byte
            type: string
          nullable: true
          type: array
        testSelfie:
          description: "Test selfie for test environment (optional, maximum 15MB).\
            \ Must be JPEG format."
          format: byte
          nullable: true
          type: string
      type: object
    KenyaNidInput:
      properties:
        firstName:
          description: The user's first name as it appears in their National ID
          minLength: 1
          type: string
        middleName:
          description: The user's middle name as it appears in their National ID (optional)
          nullable: true
          type: string
        lastName:
          description: The user's middle name as it appears in their National ID (optional)
          minLength: 1
          type: string
        dateOfBirth:
          description: "The user's date of birth, in `YYYY-MM-DD` format"
          format: date
          type: string
        gender:
          description: "The user's gender as it appears in their National ID (e.g.,\
            \ male, female)"
          minLength: 1
          type: string
        nationalIdNumber:
          description: The user's Kenya National ID number
          maxLength: 8
          minLength: 8
          pattern: ^\d*$
          type: string
      required:
      - dateOfBirth
      - firstName
      - gender
      - lastName
      - nationalIdNumber
      type: object
    KenyaNidLookup2Address:
      description: "Represents a Kenya address as stored in the IPRS (Integrated Population\
        \ Registration System) database.\n            \nThe structure reflects the\
        \ pre-2010 provincial administration system: District > Division > Location.\n\
        Since the 2010 constitutional change to counties, these legacy administrative\
        \ divisions are still\nmaintained in IPRS records for historical continuity.\n\
        \            \nThe raw address from IPRS is a newline-separated string with\
        \ labeled administrative components.\nExample format:\n            \n```\n\
        P O BOX 41842 NAIROBI\nPARLIAMENT BUILDINGS\nLOCATION - CITY SQUARE\nDIVISION\
        \ - CENTRAL\nDISTRICT - NAIROBI\n```\n            \nThe first lines contain\
        \ informal address details (village, P.O. Box) while the suffixed lines\n\
        contain official administrative designations prefixed with labels like \"\
        LOCATION -\", \"DIVISION -\", \"DISTRICT -\"."
      properties:
        district:
          description: "The district where the person resides.\n            \nThis\
            \ is the highest level of the pre-2010 administrative hierarchy stored\
            \ in IPRS. Districts were\nthe primary administrative units under Kenya's\
            \ provincial system before the change to counties in 2010.\nDistricts\
            \ roughly correspond to sub-counties in the current administrative structure."
          example: NAIROBI
          nullable: true
          type: string
        division:
          description: "The division within the district.\n            \nThis is the\
            \ second level of the pre-2010 administrative hierarchy. Divisions were\
            \ administrative\nunits between districts and locations."
          example: CENTRAL
          nullable: true
          type: string
        location:
          description: "The location within the division.\n            \nThis is the\
            \ third level of the pre-2010 administrative hierarchy. Locations were\
            \ the smallest\nadministrative units."
          example: CITY SQUARE
          nullable: true
          type: string
        additionalLines:
          description: "Additional address lines that appear before the structured\
            \ administrative parts.\n            \nMay include P.O. Box (format: \"\
            P O BOX [number] [location]\"), village names, estate names,\nor other\
            \ informal locality information."
          example:
          - P O BOX 41842 NAIROBI
          - PARLIAMENT BUILDINGS
          items:
            type: string
          nullable: true
          type: array
        raw:
          description: "The raw, unparsed address string as returned from IPRS (Integrated\
            \ Population Registration System).\n            \nThis preserves the original\
            \ newline-separated format containing both informal address components\n\
            (village, P.O. Box) and labeled administrative divisions (LOCATION, DIVISION,\
            \ DISTRICT)."
          example: P O BOX 41842 NAIROBI\nPARLIAMENT BUILDINGS\nLOCATION - CITY SQUARE\nDIVISION
            - CENTRAL\nDISTRICT - NAIROBI
          nullable: true
          type: string
      type: object
    KenyaNidLookup2Input:
      properties:
        idNumber:
          description: "The Kenya National ID Number (Nambari ya Kitambulisho) or\
            \ Unique Personal Identifier (Maisha Namba).\n            \nThis is the\
            \ primary unique identifier for Kenyan citizens in all government systems,\
            \ issued by\nthe National Registration Bureau (NRB). The format is either\
            \ 8 digits for National ID\nor 9 digits for Maisha Namba UPI (the new\
            \ format since 2023)."
          nullable: true
          type: string
      type: object
    KenyaNidLookup2ProviderOutput:
      description: Exposed properties for the `kenya-nid-lookup-2` Provider which
        do not directly map to the normalized IdentityData model.
      properties:
        firstName:
          description: The first name (given name) of the ID holder as recorded in
            IPRS.
          example: JUMA
          type: string
        surname:
          description: The surname (family name) of the ID holder as recorded in IPRS.
          example: ODHIAMBO
          type: string
        otherName:
          description: The other name (middle name) of the ID holder as recorded in
            IPRS.
          example: OTIENO
          nullable: true
          type: string
        sex:
          description: "The sex of the ID holder as recorded on the National ID.\n\
            \            \nPossible values:\n- Male\n- Female"
          example: Male
          type: string
        dateOfBirth:
          description: The date of birth of the ID holder as recorded in IPRS.
          example: 1985-01-01
          format: date
          nullable: true
          type: string
        citizenship:
          description: "Citizenship status as recorded in the IPRS civil registry\
            \ database.\n            \nFor the Kenya National ID lookup, this value\
            \ will always be \"Kenyan\" as the National ID is only\nissued to Kenyan\
            \ citizens. Non-citizens residing in Kenya are issued different identification\n\
            documents (Alien ID cards, refugee documentation, etc.) which are not\
            \ supported by this provider."
          example: Kenyan
          type: string
        idNumber:
          description: "The Kenya National ID Number (Nambari ya Kitambulisho) or\
            \ Unique Personal Identifier (Maisha Namba).\n            \nThis is the\
            \ primary unique identifier for Kenyan citizens in all government systems,\
            \ issued by\nthe National Registration Bureau (NRB). The format is either\
            \ 8 digits for National ID\nor 9 digits for Maisha Namba UPI (the new\
            \ format since 2023)."
          example: "12345678"
          type: string
        serialNumber:
          description: "The physical card serial number printed on the Kenya National\
            \ ID card.\n            \nThis is distinct from the ID Number and serves\
            \ as a card issuance tracking identifier maintained\nby IPRS. This value\
            \ changes each time a new physical card is issued (loss, damage, renewal)."
          example: "98765432"
          type: string
        dateOfIssue:
          description: The date the National ID was issued by the National Registration
            Bureau (NRB).
          example: 2010-06-15
          format: date
          nullable: true
          type: string
        placeOfBirth:
          allOf:
          - $ref: "#/components/schemas/KenyaNidLookup2Address"
          description: "Place of birth as recorded in Kenya's civil registry (IPRS).\n\
            \            \nThis is structured according to Kenya's pre-2010 administrative\
            \ hierarchy (District > Division > Location)."
          example:
            district: NAIROBI
            division: CENTRAL
            location: NGARA
            additionalLines:
            - KENYATTA NATIONAL HOSPITAL
            raw: |-
              KENYATTA NATIONAL HOSPITAL
              LOCATION - NGARA
              DIVISION - CENTRAL
              DISTRICT - NAIROBI
          nullable: true
        placeOfResidence:
          allOf:
          - $ref: "#/components/schemas/KenyaNidLookup2Address"
          description: "Current residence address as registered in IPRS.\n       \
            \     \nThis represents the address on file at the time of ID registration\
            \ or last update, structured\naccording to Kenya's pre-2010 administrative\
            \ hierarchy (District > Division > Location)."
          example:
            district: NAIROBI
            division: CENTRAL
            location: CITY SQUARE
            additionalLines:
            - P O BOX 41842 NAIROBI
            - PARLIAMENT BUILDINGS
            raw: |-
              P O BOX 41842 NAIROBI
              PARLIAMENT BUILDINGS
              LOCATION - CITY SQUARE
              DIVISION - CENTRAL
              DISTRICT - NAIROBI
          nullable: true
      required:
      - citizenship
      - firstName
      - idNumber
      - serialNumber
      - sex
      - surname
      type: object
