    UnitedKingdomEvisaProviderOutput:
      description: Exposed properties for the `uk-evisa-lookup` Provider which do
        not directly map to the normalized IdentityData model.
      properties:
        firstName:
          description: The first name of the individual as recorded on the eVisa.
          example: MUSA
          nullable: true
          type: string
        lastName:
          description: The last name of the individual as recorded on the eVisa.
          example: MOHAMMED
          nullable: true
          type: string
        dateOfBirth:
          description: The date of birth of the individual.
          example: 1990-05-15
          format: date
          nullable: true
          type: string
        shareCode:
          description: The 9-character share code used for the verification.
          example: W86BC8RAH
          nullable: true
          type: string
        referenceNumber:
          description: The eVisa reference number issued by UK Visas and Immigration
            (UKVI).
          example: ABC1234567
          nullable: true
          type: string
        expirationDate:
          description: The expiration date of the eVisa. Only present for immigration_status
            verifications.
          example: 2028-12-31
          format: date
          nullable: true
          type: string
        validFrom:
          description: The start date from which the eVisa is valid. Only returned
            for immigration_status and right_to_rent verifications — not returned
            for right_to_work.
          example: 2024-01-15
          format: date
          nullable: true
          type: string
        nationality:
          description: The nationality of the individual as recorded on the eVisa.
            Only present for immigration_status verifications.
          example: NG
          nullable: true
          type: string
        immigrationStatus:
          description: |-
            The immigration status of the individual. Only present for immigration_status verifications.
            This is a personalized record for each individual, and there is no single definitive list.
            Some common values:
            - Settled
            - Pre-settled
            - Student
            - Graduate
            - Youth Mobility
            - Global Talent
            - Skilled Worker
            - Limited leave
          example: Settled
          nullable: true
          type: string
        outcome:
          description: |-
            Overall verification outcome: "pass", "fail", or "inconclusive".
            "inconclusive" is returned for indefinite immigration statuses not yet on the provider's
            official list — identity details are still returned, but date validations cannot be performed.
          example: pass
          nullable: true
          type: string
        evidenceType:
          description: |-
            Type of verification.
            List of possible values:
            - immigration_status
            - right_to_work
            - right_to_rent
          example: immigration_status
          nullable: true
          type: string
      type: object
    UsaCaliforniaDmvInput:
