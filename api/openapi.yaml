    PanamaCedulaLookupInput:
      properties:
        documentNumber:
          description: "The number from the holder's cédula (Cédula de Identidad Personal).\n\
            \            \nSend the full number as {firstSegment}-{libro}-{tomo} (libro\
            \ 1–4 digits, tomo 1–6), using only ASCII letters,\ndigits, and hyphens.\
            \ Hyphens are not inserted for you between segments. Trinsic uppercases\
            \ letters, collapses\nrepeated hyphens, trims leading and trailing hyphens,\
            \ and merges a redundant hyphen between province and AV or PI\n(for example\
            \ 10-AV-1234-12345 becomes 10AV-1234-12345).\n            \nCitizen category\
            \ and format:\n- Born in Panama format: {province}-{libro}-{tomo} ({province}\
            \ is official code 1 through 13). Examples\n  8-1234-12345, 4-56-789,\
            \ 12-12-12345.\n- Panamanian born abroad format: PE-{libro}-{tomo}. Example\
            \ PE-1234-12345.\n- Foreign national with cédula format: E-{libro}-{tomo}.\
            \ Examples E-1234-12345, E-8-102017.\n- Naturalized citizen format: N-{libro}-{tomo}.\
            \ Example N-1234-12345.\n- Pre-2006 civil registry (AV) format: {province}AV-{libro}-{tomo}.\
            \ Example 10AV-1234-12345.\n- Indigenous (PI) format: {province}PI-{libro}-{tomo}.\
            \ Example 1PI-1234-12345."
          example: 8-1234-12345
          nullable: true
          type: string
        dateOfBirth:
          description: "The user's date of birth, in `YYYY-MM-DD` format."
          example: 1992-03-02
          format: date
          nullable: true
          type: string
      type: object
    PanamaCedulaProviderOutput:
      description: Exposed properties for the `panama-cedula-lookup` Provider which
        do not directly map to the normalized IdentityData model.
      properties:
        fullName:
          description: Full name from Tribunal Electoral records.
          example: Juan Pérez
          type: string
        givenName:
          description: Given name(s) from Tribunal Electoral records.
          example: Juan
          type: string
        familyName:
          description: Family name(s) from Tribunal Electoral records.
          example: Pérez
          type: string
        dateOfBirth:
          description: Verified date of birth from Tribunal Electoral records.
          example: 1992-03-02
          format: date
          nullable: true
          type: string
        documentNumber:
          description: "The matched personal identity cédula (Cédula de Identidad\
            \ Personal) number from Tribunal Electoral records.\n            \nOn\
            \ output, Trinsic applies the same normalization as for lookup input.\
            \ Structure is always {firstSegment}-{libro}-{tomo}:\nlibro is one to\
            \ four digits and tomo is one to six digits, separated by hyphens.\n \
            \           \nCitizen category and format:\n- Born in Panama format: {province}-{libro}-{tomo}\
            \ ({province} is official code 1 through 13). Examples\n  8-1234-12345,\
            \ 4-56-789, 12-12-12345.\n- Panamanian born abroad format: PE-{libro}-{tomo}.\
            \ Example PE-1234-12345.\n- Foreign national with cédula format: E-{libro}-{tomo}.\
            \ Examples E-1234-12345, E-8-102017.\n- Naturalized citizen format: N-{libro}-{tomo}.\
            \ Example N-1234-12345.\n- Pre-2006 civil registry (AV) format: {province}AV-{libro}-{tomo}.\
            \ Example 10AV-1234-12345.\n- Indigenous (PI) format: {province}PI-{libro}-{tomo}.\
            \ Example 1PI-1234-12345."
          example: 8-1234-12345
          type: string
        nationalityOrResidenceType:
          description: "Inferred from DocumentNumber. Values are nationality or residence\
            \ category.\n            \nPossible values:\n- BornInPanama\n- ForeignNational\n\
            - BornAbroad\n- Naturalized\n- LegacyNumber\n- Indigenous\n- Unknown (we\
            \ were unable to determine the category)"
          example: BornInPanama
          type: string
        subdivisionOfOrigin:
          description: "ISO 3166-2 principal subdivision code. Only available for\
            \ BornInPanama, LegacyNumber, and Indigenous.\n            \nPossible\
            \ values, matching cédula province digits 1–13:\n1. PA-1 - Bocas del Toro\n\
            2. PA-2 - Coclé\n3. PA-3 - Colón\n4. PA-4 - Chiriquí\n5. PA-5 - Darié\
            n\n6. PA-6 - Herrera\n7. PA-7 - Los Santos\n8. PA-8 - Panamá\n9. PA-9\
            \ - Veraguas\n10. PA-KY - Guna Yala\n11. PA-EM - Emberá\n12. PA-NB - Ngä\
            be-Buglé\n13. PA-10 - Panamá Oeste"
          example: PA-8
          nullable: true
          type: string
        subdivisionOfOriginName:
          description: "Subdivision display name from the ISO 3166-2 registry, when\
            \ available."
          example: Panamá
          nullable: true
          type: string
      required:
      - documentNumber
      - familyName
      - fullName
      - givenName
      - nationalityOrResidenceType
      type: object
