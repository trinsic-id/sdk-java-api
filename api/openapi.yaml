          type: string
        dateOfBirth:
          description: "Date of birth of the individual.\n            \nNOTE: Only\
            \ available when PAN status is VALID and the verification is for an individual\
            \ person."
          example: 1943-08-15
          nullable: true
          type: string
        panStatus:
          description: "PAN card status from Signzy for the lookup.\n            \n\
            Possible values:\n- VALID\n- FAKE\n- DEACTIVATED\n- DELETED\n- INVALID\n\
            - AMALGAMATION\n- ACQUISITION\n- DEATH\n- DISSOLUTION\n- LIQUIDATED\n\
            - MERGER\n- PARTITION\n- SPLIT\n- UNDER LIQUIDATION\n- INOPERATIVE"
          example: VALID
          nullable: true
          type: string
      type: object
    IndiaPanStructuredNumber:
      properties:
        seriesCode:
          description: "Three-letter block issued by the Income Tax Department of\
            \ India.\n            \nTies the number to a specific Income Tax Office\
            \ or jurisdiction using an internal labeling system.\n            \nPosition:\n\
            - Characters 1 through 3 of the PAN\n            \nPossible values:\n\
            - Any three-letter block of uppercase Latin letters"
          example: ABC
          type: string
        assesseeCategoryCode:
          description: "Code that represents the entity that is subject to income\
            \ tax in India.\n            \nPosition:\n- Character 4 of the PAN\n \
            \           \nPossible values:\n- \"A\" for Association of Persons (AOP)\n\
            - \"B\" for Body of Individuals (BOI)\n- \"C\" for Company\n- \"F\" for\
            \ Firm\n- \"G\" for Government\n- \"H\" for Hindu Undivided Family (HUF)\n\
            - \"J\" for Artificial Juridical Person\n- \"L\" for Local Authority\n\
            - \"P\" for Individual\n- \"T\" for Trust"
          example: P
          type: string
        assesseeCategoryName:
          description: "Human-readable label for the assessee category when it matches\
            \ a known code.\n            \nPossible values:\n- Association of Persons\
            \ (AOP)\n- Body of Individuals (BOI)\n- Company\n- Firm\n- Government\n\
            - Hindu Undivided Family (HUF)\n- Artificial Juridical Person\n- Local\
            \ Authority\n- Individual\n- Trust\n            \nOmitted when the letter\
            \ is not a standard category code."
          example: Individual
          nullable: true
          type: string
        namePrefixLetter:
          description: "First letter of the name of the entity that is subject to\
            \ income tax in India.\n            \nPosition:\n- Character 5 of the\
            \ PAN.\n            \nFormat:\n- When AssesseeCategoryCode is P, this\
            \ character is the first letter of the individual's\n  family name as\
            \ recorded for the PAN.\n- When AssesseeCategoryCode is A, B, C, F, G,\
            \ H, J, L, or T, this character is the first letter\n  of the name of\
            \ the association, body, company, firm, government, HUF, local authority,\
            \ or\n  trust.\n            \nPossible values:\n- Any uppercase Latin\
            \ letter"
          example: S
          type: string
        serialNumber:
          description: "Sequential four-digit field assigned by the Income Tax Department\
            \ of India.\n            \nEach PAN receives a unique serial within the\
            \ given series code and assessee category.\n            \nPosition:\n\
            - Characters 6 through 9 of the PAN.\n            \nPossible values:\n\
            - Four-digit strings 0001 through 9999 inclusive, using only digits 0\
            \ through 9"
          example: "1234"
          type: string
        checkLetter:
          description: "Alphabetic check character for the first nine characters of\
            \ the PAN.\n            \nThe algorithm has not been made publicly available\
            \ by the Income Tax Department of India.\n            \nPosition:\n- Character\
            \ 10 of the PAN.\n            \nPossible values:\n- One uppercase Latin\
            \ letter A through Z"
          example: Z
          type: string
      required:
      - assesseeCategoryCode
      - checkLetter
      - namePrefixLetter
      - serialNumber
      - seriesCode
      type: object
