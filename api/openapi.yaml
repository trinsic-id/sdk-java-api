    SpidInput:
      properties:
        subProviderId:
          description: "The ID of the specific IDP to invoke within SPID.\n      \
            \      \nIf not specified, the user will be prompted to select an IDP."
          nullable: true
          type: string
        billingTrackingSecret:
          description: "Only applicable if period-based billing is enabled for your\
            \ Verification Profile. Contact Trinsic to enable this.\n            \n\
            A secret UTF-8 string between 32 and 64 characters in length, used to\
            \ enable privacy-preserving tracking of unique user verifications during\
            \ a billing period.\n            \nWARNING: This value must NOT change\
            \ during the course of a billing period for a given Verification Profile,\
            \ or double-billing may occur.\nIf multiple Verification Profiles are\
            \ configured to use the same Trinsic-managed SPID Service Provider, the\
            \ same Billing Tracking Secret must be provided across all such Verification\
            \ Profiles."
          nullable: true
          type: string
      type: object
    SpidProviderOutput:
      description: Exposed properties for the `italy-spid` Provider which do not directly
        map to the normalized IdentityData model.
      properties:
        billingInformation:
          allOf:
          - $ref: "#/components/schemas/SpidBillingInformation"
          description: "Information about the billable status of this SPID Verification.\n\
            \            \nPresent only if your account has period-based billing enabled\
            \ for SPID. Contact Trinsic to enable this."
          nullable: true
        identityProviderEntityId:
          description: "The SPID Entity ID of the Identity Provider which issued the\
            \ SPID identity.\n            \nThis is an HTTPS URI which uniquely identifies\
            \ the IdP within the SPID federation.\n            \nA normalized / simplified\
            \ representation of this value is present in the `originatingSubProviderId`\
            \ field in Trinsic's normalized data model."
          example: https://spid.register.it
          type: string
        spidCode:
          description: "The identifier of the SPID credential, uniquely identifying\
            \ it within the SPID federation.\n            \nThe format of this string\
            \ is specific to each individual Identity Provider."
          example: SPID-002
          type: string
        spidCredentialExpirationDate:
          description: "Expiration date of the SPID credential.\n            \nThis\
            \ is not the same as the expiration date of the underlying identity document\
            \ (such as a passport) which was\nused to create the SPID identity."
          example: 2030-12-21
          format: date
          nullable: true
          type: string
        rawIdCard:
          description: "The raw, space-separated string value for the \"IdCard\" field\
            \ from the SPID credential.\n            \nTrinsic additionally parses\
            \ this field and uses it to populate the `Document` object in the normalized\
            \ data model."
          example: passaporto KK1234567 questuraLivorno 2016-09-04 2026-09-03
          nullable: true
          type: string
        givenName:
          description: The individual's first / given name(s)
          example: Ada
          nullable: true
          type: string
        familyName:
          description: The individual's last / family name(s)
          example: Lovelace
          nullable: true
          type: string
        dateOfBirth:
          description: The date of birth of the individual
          example: 1985-12-10
          format: date
          nullable: true
          type: string
        gender:
          description: "The gender of the individual.\n            \nPossible values:\
            \ \"M\" | \"F\""
          example: F
          nullable: true
          type: string
        placeOfBirth:
          description: "The individual's place of birth.\n            \nThis is a\
            \ 4-digit Belfiore Code identifying either the municipality of birth (for\
            \ births in Italy) or a foreign country (for births outside Italy)."
          example: G702
          nullable: true
          type: string
        countyOfBirth:
          description: "The individual's county (province) of birth, abbreviated.\n\
            \            \nFor foreign births, this is \"EE\"."
          example: PI
          nullable: true
          type: string
        domicileStreetAddress:
          description: "The street address of the individual's residence.\n      \
            \      \nThis includes street name, street type, and house number, in\
            \ the standard format for the given state."
          example: Via Liszt 21
          nullable: true
          type: string
        domicilePostalCode:
          description: The postal code of the individual's residence
          example: "00144"
          nullable: true
          type: string
        domicileMunicipality:
          description: The municipality of the individual's residence
          example: Rome
          nullable: true
          type: string
        domicileProvince:
          description: The province of the individual's residence
          example: RM
          nullable: true
          type: string
        domicileNation:
          description: The 2-digit country code of the individual's residence
          example: IT
          nullable: true
          type: string
        email:
          description: The email address of the individual
          example: example@example.com
          nullable: true
          type: string
        mobilePhone:
          description: "The mobile phone number of the individual, in Italian format."
          example: "34912345678"
          nullable: true
          type: string
        digitalAddress:
          description: The PEC (Italian Certified Email) address of the individual
            or organization.
          example: name@pecdomain.it
          nullable: true
          type: string
        fiscalNumber:
          description: Fiscal tax number for the individual.
          example: TINIT-ABCXYZ00W00Z000Z
          nullable: true
          type: string
        ivaCode:
          description: "The VAT number of the organization which was verified, or\
            \ of the organization which the verified individual is associated with."
          example: VATIT-12345678901
          nullable: true
          type: string
        companyName:
          description: "The name of the organization which was verified, or of the\
            \ organization which the verified individual is associated with."
          example: ACME Corporation
          nullable: true
          type: string
        companyFiscalNumber:
          description: "The fiscal tax number of the organization which was verified,\
            \ or of the organization which the verified individual is associated with."
          example: TINIT-12345678901
          nullable: true
          type: string
        registeredOffice:
          description: "The registered office address of the organization which was\
            \ verified, or of the organization which the verified individual is associated\
            \ with."
          example: via Listz 21 00144 Rome
          nullable: true
          type: string
      required:
      - identityProviderEntityId
      - spidCode
      type: object
    StepRefreshInfo:
      properties:
