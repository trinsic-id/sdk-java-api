          type: string
        description:
          deprecated: true
          description: A description of the provider's capabilities
          example: Identity verification via government ID and biometrics
          readOnly: true
          type: string
        geography:
          deprecated: true
          description: Geographic regions where this provider operates
          example:
          - Global
          items:
            type: string
          type: array
        regions:
          description: Specific regions supported by this provider
          example:
          - Europe
          items:
            type: string
          type: array
        countries:
          description: The countries where this Provider is available (as alpha-2
            ISO codes).
          example:
          - US
          - CA
          items:
            type: string
          type: array
        subdivisions:
          description: "The subdivisions (states, provinces, etc.) where this Provider\
            \ is available (as alpha-2 ISO codes)."
          example:
          - US-CA
          - US-TX
          items:
            type: string
          type: array
        licensed:
          description: Whether this provider is licensed for use by your organization
          example: true
          type: boolean
        launchMethod:
          allOf:
          - $ref: "#/components/schemas/IntegrationLaunchMethod"
          description: "Relevant only to Direct Provider Sessions.\n            \n\
            The `LaunchMethod` which must be supported to launch the Provider Session\
            \ in Direct Provider Sessions."
          example: DeeplinkToMobile
          x-enumDescriptions:
            LaunchBrowser: "The user's browser should be sent to the provided URL,\
              \ either in a new tab, pop-up, or top-level navigation."
            None: |-
              No action needs to be taken by the user; simply poll with the provided `resultsAccessKey`
              for the results of the session.
            DeeplinkToMobile: "The user must be sent to the provided URL, which is\
              \ a mobile deeplink.\n            \nThe URL should be shown as a button\
              \ on mobile, or as a QR code on desktop."
            ShowContent: Content must be displayed to the user to guide them through
              the process of verifying their identity.
            PerformNativeChallenge: "A challenge must be sent to a native API on the\
              \ user's device, such as the Digital Credentials API on web,\nor the\
              \ equivalent mDL exchange APIs on Android or iOS.\n            \nUse\
              \ Trinsic's UI SDKs on Web, Android, or iOS to streamline this process."
        collectionMethod:
          allOf:
          - $ref: "#/components/schemas/ResultCollectionMethod"
          description: "Relevant only to Direct Provider Sessions.\n            \n\
            The `CollectionMethod` which must be supported to launch the Provider\
            \ Session in Direct Provider Sessions."
          example: PollResult
          x-enumDescriptions:
            PollResult: "The results will be made available asynchronously, via a\
              \ polling mechanism.\n            \nUse the provided `ResultsAccessKey`\
              \ to poll for the results via the `GetResults` API."
            CaptureRedirect: "The user will be sent back to your application with\
              \ a `resultsAccessKey` in the query string.\n            \nUpon redirect,\
              \ use the provided `ResultsAccessKey` to retrieve the results via the\
              \ `GetResults` API."
            SubmitNativeChallengeResponse: "Submit a response to a native challenge\
              \ performed on the user's device, such as a native mDL exchange\nvia\
              \ the Digital Credentials API on web, or the equivalent native APIs\
              \ on Android or iOS.\n            \nSee the `PerformNativeChallenge`\
              \ launch method for more details."
        resultsMayBeDelayedAfterRedirect:
          description: "If `true`, then the results for this Provider may not be available\
            \ immediately after the user is redirected back\nto your application.\
            \ In this case, the `GetSessionResults` API must be called until results\
            \ are available.\n            \nThis is an uncommon scenario, and only\
            \ applies to Providers which cannot guarantee\nthe availability of results\
            \ immediately after the user is redirected back to your application."
          example: false
          type: boolean
        hasRefreshableContent:
          description: "Relevant only to Direct Provider Sessions.\n            \n\
            Whether the Provider requires the `RefreshStepContent` capability.\n \
            \           \nFor example, Samsung Wallet's deep links expire every 30\
            \ seconds, and must be refreshed periodically for a\nresilient user flow."
          example: false
          type: boolean
        requiresInput:
          description: "Relevant to Hosted Provider Sessions and Direct Provider Sessions.\n\
            \            \nIf `true`, this Provider requires provider-specific input\
            \ on Session creation.\nIf this input is not provided, Trinsic's Hosted\
            \ UI will be invoked to collect the input from the user."
          example: false
          type: boolean
        hasTrinsicInterface:
          description: "Whether there exists a Trinsic-hosted UI for this Provider.\n\
            \            \nThis is `true` for any Provider which is not a simple,\
            \ OIDC-like redirect flow."
          example: true
          type: boolean
        supportsDirectProviderSessions:
          description: "Whether this Provider can be fully whitelabeled/OEMed through\
            \ the Direct Provider Sessions API.\n            \nIf `false`, the Provider\
            \ may still be launched through Direct Provider Sessions;\nhowever, it\
            \ will necessarily require a Trinsic-hosted UI to function."
          example: true
          type: boolean
        supportedLanguages:
          description: "Languages supported by this Provider's Trinsic-hosted UI,\
            \ as BCP 47 language codes."
          items:
            $ref: "#/components/schemas/ProviderSupportedLanguage"
          nullable: true
          type: array
        availableAttributes:
          description: Information about the user attributes that this Provider will
            return in verification results.
          items:
            $ref: "#/components/schemas/ContractAttribute"
          nullable: true
          type: array
        availableAttachments:
          description: Information about the attachments that this Provider will return
            in verification results.
          items:
            $ref: "#/components/schemas/ContractAttachment"
          nullable: true
          type: array
        subProviders:
          description: "Metadata about the sub-providers which are available for this\
            \ Provider in the current Environment.\n            \nFor example, Italy's\
            \ SPID is a Provider which aggregates access to multiple sub-providers."
          items:
            $ref: "#/components/schemas/SubProviderMetadata"
          nullable: true
          type: array
        liveHealth:
          allOf:
          - $ref: "#/components/schemas/ProviderHealth"
          description: The health for a provider in the live environment
          example: Offline
          x-enumDescriptions:
            Online: The integration is up and available to support verification sessions.
            Offline: The integration has been disabled and unavailable at this time
