    LithuaniaIdCardProviderOutput:
      description: Exposed properties for the `a-lt-id-login` Provider which do not
        directly map to the normalized IdentityData model.
      properties:
        firstName:
          description: The first name of the verified individual
          example: John
          type: string
        lastName:
          description: The last name of the verified individual
          example: Doe
          type: string
        dateOfBirth:
          description: The date of birth of the verified individual
          example: 1985-12-10
          format: date
          type: string
        personalCode:
          description: "The 11-digit Lithuanian Personal Code (asmens kodas) of the\
            \ verified individual.\n            \nIf the first digit is \"9\" (rare),\
            \ the rest of the identifier is random and has no structure.\n       \
            \     \nOtherwise, this is in the format GYYMMDDSSSC, where:\n       \
            \     \n- G is both gender and century of birth\n- YYMMDD is the date\
            \ of birth\n- SSS is a sequential serial number\n- C is a checksum digit\n\
            \            \nIf G is odd, the gender is male.\nIf G is even, the gender\
            \ is female.\n            \nIf G is 1 or 2, the individual was born in\
            \ the 19th century (1800-1899).\nIf G is 3 or 4, the individual was born\
            \ in the 20th century (1900-1999).\nIf G is 5 or 6, the individual was\
            \ born in the 21st century (2000-2099).\n            \nRarely, the date\
            \ of birth may be encoded as 000000 if it is not known."
          example: "38006309999"
          type: string
      required:
      - dateOfBirth
      - firstName
      - lastName
      - personalCode
      type: object
    LloydsSmartIdProviderOutput:
      description: Exposed properties for the `lloyds-smart-id` Provider which do
        not directly map to the normalized IdentityData model.
      properties:
        rememberMeId:
          description: "A Yoti-generated unique ID for this individual, consistent\
            \ across repeat shares and different for each Relying Party."
          example: 9f63ff98-e1e3-433c-9b86-7c697d0b4e5f
          format: uuid
          nullable: true
          type: string
        email:
          description: The email address of the individual
          example: johndoe@example.com
          nullable: true
          type: string
        givenName:
          description: The given name of the individual. This can correspond to first
            and middle names in English.
          example: John Alvin
          nullable: true
          type: string
        familyName:
          description: The family name of the individual
          example: Doe
          nullable: true
          type: string
        fullName:
          description: |-
            Full name of the individual which is composed of the given and family name.
            Unverified full name may be safe to use. For example, Aadhaar card provides full name, but due to certain limitations of verifying Aadhaar, Yoti is unable to verify this property so it is listed as "unverified".
          example: John Alvin Doe
          nullable: true
          type: string
        dateOfBirth:
          description: |-
            The date of birth of the individual.
            Unverified date of birth may be safe to use. For example, Aadhaar card provides date of birth, but due to certain limitations of verifying Aadhaar, Yoti is unable to verify this property so it is listed as "unverified".
          example: 1985-01-31
          format: date
          nullable: true
          type: string
        gender:
          description: "The gender of the individual. Depending on the source or country,\
            \ gender may not be verified. This is a setting that can be configured\
            \ while setting up scopes.\n            \nUnverified gender may be safe\
            \ to use. For example, Aadhaar card provides gender, but due to certain\
            \ limitations of verifying Aadhaar, Yoti is unable to verify this property\
            \ so it is listed as \"unverified\".\nIn some countries\nPossible values:\n\
            - \"MALE\"\n- \"FEMALE\"\n- \"TRANSGENDER\"\n- \"OTHER\""
          example: MALE
          nullable: true
          type: string
        nationality:
          description: The nationality of the individual as a ISO alpha-3 code
          example: GBR
          nullable: true
          type: string
        mobileNumber:
          description: "The mobile phone number of the individual. This number was\
            \ verified with a one time password (OTP) during the individual's registration\
            \ with Yoti. In some cases, Yoti may do additional checks against its\
            \ sources to confirm the individual's identity."
          example: "+447777123456"
          nullable: true
          type: string
        structuredPostalAddress:
          allOf:
          - $ref: "#/components/schemas/YotiStructuredPostalAddress"
          description: |-
            A structured postal address for the individual that comes from the underlying document or can be manually added. In the case of being manually added, the address is considered "unverified".
            Unverified addresses may be safe to use. For example, Aadhaar card provides an address, but due to certain limitations of verifying Aadhaar, Yoti is unable to verify this property so it is listed as "unverified".
          nullable: true
        postalAddress:
          description: |-
            The whole address for the individual that comes from the underlying document or can be manually added. In the case of being manually added, the address is considered "unverified". The format of this will be different for each country.
            Refer to `StructuredPostalAddress` for a detailed version of the address.
          example: "6th Floor, 107 Leadenhall St, London, EC3A 4AF"
          nullable: true
          type: string
        documentDetails:
          allOf:
          - $ref: "#/components/schemas/YotiDocumentDetails"
          description: The details of the underlying document used to help create
            the Yoti credential
          nullable: true
      type: object
    Match:
      properties:
        probabilityValue:
          description: "The probability value of the match.\n            \nThis is\
            \ a value between 0 and 1, where 1 indicates a perfect match and 0 indicates\
            \ no match.\n            \nThis field is non-null when the underlying\
            \ Provider's match output is in the form of a probability score."
          format: double
          nullable: true
          type: number
        booleanValue:
          description: "The boolean value of the match.\n            \nThis is a value\
            \ of true or false, where true indicates a match and false indicates no\
            \ match.\n            \nThis field is non-null when the underlying Provider's\
            \ match output is in the form of a boolean value."
          nullable: true
          type: boolean
      type: object
    MatchData:
      description: "Match results for the data being matched against.\n          \
        \  \nThis applies to Providers which operate based on matching data / biometrics\
        \ against a government database,\nreturning match scores or results as opposed\
        \ to the data itself."
      properties:
        nationalIdNumber:
          allOf:
          - $ref: "#/components/schemas/Match"
          description: Whether the provided National ID Number matched the information
            on file for the individual
          example: true
          nullable: true
        fullName:
          allOf:
          - $ref: "#/components/schemas/Match"
          description: "The match score for the full name of the individual.\n   \
            \         \nHigher values indicate a closer match."
          example: 1
          nullable: true
        givenName:
          allOf:
          - $ref: "#/components/schemas/Match"
          description: "The match score for the given (first) name of the individual.\n\
            \            \nHigher values indicate a closer match."
          example: 1
          nullable: true
        middleName:
          allOf:
          - $ref: "#/components/schemas/Match"
          description: "The match score for the middle name(s) of the individual.\n\
            \            \nHigher values indicate a closer match."
          example: 1
          nullable: true
        familyName:
          allOf:
          - $ref: "#/components/schemas/Match"
          description: "The match score for the family (last) name of the individual.\n\
            \            \nHigher values indicate a closer match."
          example: 0
          nullable: true
        sex:
          allOf:
          - $ref: "#/components/schemas/Match"
          description: Whether the provided sex of the individual matched the information
            on file for the individual
          example: false
          nullable: true
        dateOfBirth:
          allOf:
          - $ref: "#/components/schemas/Match"
          description: Whether the provided date of birth matched the information
            on file for the individual
          example: true
          nullable: true
        phoneNumber:
          allOf:
          - $ref: "#/components/schemas/Match"
          description: Whether the provided phone number matched the information on
            file for the individual
          example: true
          nullable: true
        faceMatch:
          allOf:
          - $ref: "#/components/schemas/Match"
          description: "The match score for the face match between the provided selfie\
            \ image and the biometrics on file for the individual.\n            \n\
            Higher values indicate greater match confidence."
          example: 0.9646
          nullable: true
        liveness:
          allOf:
          - $ref: "#/components/schemas/Match"
          description: "The confidence score for the liveness check performed against\
            \ the selfie image of the individual.\n            \nHigher values indicate\
            \ lower suspicion."
          example: 0.9501
          nullable: true
        imageAuthenticity:
          allOf:
          - $ref: "#/components/schemas/Match"
          description: "The confidence score for the image manipulation check performed\
            \ against the selfie image of the individual.\n            \nHigher values\
            \ indicate lower suspicion of image manipulation."
          example: 0.2088
          nullable: true
      type: object
    MdlExchangeMechanism:
      enum:
      - NativeApp
      - DigitalCredentialsApi
      type: string
      x-enumDescriptions:
