    NorwegianBankIdProviderOutput:
      description: Exposed properties for the `norway-bankid` Provider which do not
        directly map to the normalized IdentityData model.
      properties:
        fullName:
          description: The full name of the individual.
          example: Ove Henriksen
          nullable: true
          type: string
        dateOfBirth:
          description: The date of birth of the individual.
          example: 1943-08-15
          format: date
          nullable: true
          type: string
        personalIdentifier:
          description: "The personal identifier for Norwegian BankID.\n          \
            \  \nThis uniquely identifies the individual in the Norwegian BankID system\
            \ and is considered a stable identifier to use."
          example: 9578-5999-4-1765512
          nullable: true
          type: string
        nationalIdentityNumber:
          description: "The 11-digit Norwegian National Identity Number (fødselsnummer)\
            \ of the verified individual.\n            \nThis is in the format DDMMYYZZZCC,\
            \ where:\n- DDMMYY is the date of birth (In some cases, this is not the\
            \ date of birth due to no available identity numbers for some dates\n\
            - ZZZ is an individual number, indicating gender\n- CC is a checksum character\n\
            \            \nIf ZZZ is even, the individual is female.\nIf ZZZ is odd,\
            \ the individual is male."
          example: "30069012345"
          nullable: true
          type: string
        givenName:
          description: The given name of the individual.
          example: Ole
          nullable: true
          type: string
        familyName:
          description: The family name of the individual.
          example: Olsen
          nullable: true
          type: string
        levelOfAssurance:
          description: "The level of assurance (LOA) for the verification.\n     \
            \       \nThe LOA refers to the degree of confidence in the claimed identity\
            \ of a person.\nThe European Digital Identity Framework (EUDI) measures\
            \ the confidence of the digital identity's verification and authentication\
            \ strength by a set of requirements for different levels.\nTo learn more,\
            \ see: https://ec.europa.eu/digital-building-blocks/sites/spaces/DIGITAL/pages/467110081/eIDAS+Levels+of+Assurance\n\
            \            \nPossible values:\n- Low: The individual has self asserted\
            \ their identity and multifactor authentication is not required.\n- Substantial:\
            \ The individual has performed either a remote or in-person identity verification\
            \ and multifactor authentication is required.\n- High: The individual\
            \ has performed an in-person identity proofing with an authorized representative\
            \ and has strong cryptographic authentication requirements such as using\
            \ a smart card."
          example: High
          nullable: true
          type: string
        authenticationMethod:
          description: "The authentication method used by the individual.\n      \
            \      \nPossible values:\n- urn:bankid:bis - BankID with Biometrics\n\
            - urn:bankid:bid - Standard BankID with High Assurance"
          example: urn:bankid:bis
          nullable: true
          type: string
      type: object
