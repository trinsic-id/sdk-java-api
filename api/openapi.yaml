  /api/v1/verification-profiles/{verificationProfileId}/sessions:
    get:
      description: List Sessions created for a specific Verification Profile
      operationId: ListSessions
      parameters:
      - explode: false
        in: path
        name: verificationProfileId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      - description: The field by which sessions should be ordered
        example: Created
        explode: true
        in: query
        name: OrderBy
        required: false
        schema:
          allOf:
          - $ref: "#/components/schemas/SessionOrdering"
          example: Created
          x-enumDescriptions:
            Created: Order sessions by their creation date
            Updated: Order sessions by the date their state last changed
            State: Order sessions by their state
        style: form
      - example: Descending
        explode: true
        in: query
        name: OrderDirection
        required: false
        schema:
          allOf:
          - $ref: "#/components/schemas/OrderDirection"
          example: Descending
          x-enumDescriptions:
            Ascending: ""
            Descending: ""
        style: form
      - description: The number of items to return per page -- must be between `1`
          and `50`
        example: 50
        explode: true
        in: query
        name: PageSize
        required: false
        schema:
          example: 50
          format: int32
          maximum: 50
          minimum: 1
          type: integer
        style: form
      - description: The page number to return -- starts at `1`
        example: 1
        explode: true
        in: query
        name: Page
        required: false
        schema:
          example: 1
          format: int32
